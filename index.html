<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio R3 · Parcial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE6;--border:#E2DDD5;--border2:#C8C2B8;--text:#1A1814;--text2:#6B6560;--text3:#A09A93;--accent:#2C5F8A;--accent-bg:#EAF2F8;--accent-text:#1A3D5C;--green:#2D6A4F;--green-bg:#D8EFDF;--red:#8B2020;--red-bg:#FDEAEA;--amber:#7A4F00;--amber-bg:#FEF3DC;--purple:#4A2C8A;--purple-bg:#EDE8F8;--teal:#1A5C52;--teal-bg:#E0F2EE;--coral:#7A2C1A;--coral-bg:#F8EAE6;--r:10px;--r-lg:14px;--shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.app-shell{max-width:740px;margin:0 auto;padding:0 16px 80px}
.app-header{padding:28px 0 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.app-header-left h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:var(--text);line-height:1.2}
.app-header-left p{font-size:13px;color:var(--text3);margin-top:4px}
.overall-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 16px;min-width:72px;box-shadow:var(--shadow)}
.overall-badge .num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);line-height:1}
.overall-badge .lbl{font-size:10px;color:var(--text3);margin-top:2px;text-align:center}
.progress-wrap{margin-bottom:20px}
.progress-header{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow)}
.stat-card .val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.day-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface2);border-radius:var(--r);padding:4px}
.day-tab{flex:1;padding:9px 12px;border:none;border-radius:7px;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all 0.18s;text-align:center;line-height:1.3}
.day-tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:var(--shadow)}
.section-label{font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden;transition:border-color 0.15s}
.topic-card:hover{border-color:var(--border2)}
.topic-card.is-open{border-color:var(--border2)}
.topic-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.check-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;color:transparent;font-size:13px}
.check-btn.done{background:var(--accent);border-color:var(--accent);color:#fff}
.topic-info{flex:1;min-width:0}
.topic-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.topic-meta{font-size:12px;color:var(--text3);margin-top:2px}
.topic-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.b-endo{background:var(--purple-bg);color:var(--purple)}
.b-cardio{background:var(--coral-bg);color:var(--coral)}
.b-nefro{background:var(--teal-bg);color:var(--teal)}
.b-gi{background:var(--amber-bg);color:var(--amber)}
.topic-chevron{font-size:16px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.topic-card.is-open .topic-chevron{transform:rotate(180deg)}
.topic-body{padding:0 16px 16px 50px;display:none;border-top:1px solid var(--border)}
.topic-body.open{display:block}
.mode-tabs{display:flex;gap:6px;padding-top:14px;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s}
.mode-btn i{font-size:14px}
.mode-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);font-weight:500}
.content-panel{display:none}
.content-panel.active{display:block}
.resumen{font-size:13px;color:var(--text2);line-height:1.75}
.resumen ol{padding-left:1.4rem}
.resumen li{margin-bottom:6px}
.fc-wrap{perspective:800px;margin-bottom:8px}
.fc{position:relative;width:100%;min-height:110px;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;min-height:110px;backface-visibility:hidden;border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.6}
.fc-front{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:500}
.fc-back{background:var(--accent-bg);border:1px solid #B8D4E8;color:var(--accent-text);transform:rotateY(180deg)}
.fc-tap-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:116px;margin-bottom:10px}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.fc-counter{font-size:12px;color:var(--text3)}
.nav-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);cursor:pointer;transition:background 0.12s}
.nav-btn i{font-size:14px}
.nav-btn:hover{background:var(--surface2)}
.quiz-item{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.quiz-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.quiz-q{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.65;padding:10px 12px;background:var(--surface2);border-radius:var(--r);border-left:3px solid var(--accent)}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.quiz-opt{padding:9px 13px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);cursor:pointer;text-align:left;transition:all 0.14s;line-height:1.5}
.quiz-opt:hover:not(:disabled){background:var(--surface2);border-color:var(--border2)}
.quiz-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:500}
.quiz-opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.quiz-opt:disabled{cursor:default}
.quiz-feedback{display:none;font-size:12px;line-height:1.6;color:var(--text2);background:var(--surface2);border-radius:var(--r);padding:10px 12px;border-left:3px solid var(--green)}
.quiz-feedback.show{display:block}
.quiz-score{font-size:12px;color:var(--text3);text-align:right;margin-bottom:8px}
.float-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(247,245,240,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:8px;z-index:100}
.float-bar span{font-size:12px;color:var(--text2)}
.float-pips{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.pip{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;transition:all 0.2s}
.pip.done{background:var(--accent);border-color:var(--accent)}
@media(max-width:480px){.app-header-left h1{font-size:21px}.topic-body{padding-left:16px}.day-tab{font-size:12px;padding:8px 8px}}
</style>
</head>
<body>
<div class="app-shell">
  <div class="app-header">
    <div class="app-header-left">
      <h1>Plan de estudio<br><em>Residencia III</em></h1>
      <p>Parcial · 2 días · 8 h/día · Harrison 22e</p>
    </div>
    <div class="overall-badge">
      <div class="num" id="pct">0%</div>
      <div class="lbl">completado</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-header">
      <span id="prog-label">0 de 12 temas completados</span>
      <span id="hrs-left">16 h restantes</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="val" id="s-done">0</div><div class="lbl">Completados</div></div>
    <div class="stat-card"><div class="val" id="s-total">12</div><div class="lbl">Total temas</div></div>
    <div class="stat-card"><div class="val" id="s-flash">0</div><div class="lbl">Flashcards vistas</div></div>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="switchDay(0)">Día 1<br><span style="font-size:11px;opacity:.7">Endocrino + Cardio</span></button>
    <button class="day-tab" onclick="switchDay(1)">Día 2<br><span style="font-size:11px;opacity:.7">Nefro + Digestivo</span></button>
  </div>
  <p class="section-label" id="day-label">Día 1 · Endocrino (mañana) · Cardio (tarde)</p>
  <div id="topics-container"></div>
</div>
<div class="float-bar">
  <span>Progreso global</span>
  <div class="float-pips" id="pips"></div>
</div>
<script>
const DAYS = [
 [
  {id:'hh',title:'Eje hipotálamo-hipófisis',badge:'b-endo',badgeLabel:'Endocrino',meta:'~1.5 h · Cap. 390 · Harrison 22e',
   resumen:[
    'La adenohipófisis produce 6 hormonas trópicas: GH, PRL, LH, FSH, TSH y ACTH, todas reguladas por hormonas hipotalámicas liberadoras e inhibidoras.',
    'El hipotálamo controla la hipófisis a través del sistema porta hipofisario; la dopamina es el principal inhibidor de la prolactina (tono inhibidor constante).',
    'Panhipopituitarismo: orden de restitución hormonal → cortisol primero (riesgo vital), luego levotiroxina, luego gonadal, GH al final.',
    'Acromegalia: adenoma somatotrófico → exceso de GH → IGF-1 elevado. Manifestaciones: prognatismo, macroglósia, crecimiento acral, HTA, DM2, síndrome del túnel carpiano.',
    'Diagnóstico de acromegalia: IGF-1 elevado + GH que NO suprime <1 ng/mL tras sobrecarga oral de glucosa (CTOG). La RM hipofisaria localiza el tumor.',
    'Tratamiento de acromegalia: cirugía transesfenoidal de primera línea; si persiste: análogos de somatostatina (octreotida, lanreotida) ± cabergolina ± pegvisomant.',
    'Hiperprolactinemia: causa más frecuente de amenorrea-galactorrea en mujeres en edad fértil. PRL >200 ng/mL orienta a prolactinoma. El efecto de tallo rara vez supera 150 ng/mL.',
    'Microadenoma hipofisario: <1 cm. Macroadenoma: ≥1 cm. El macroadenoma puede comprimir el quiasma óptico → hemianopsia bitemporal.',
    'Primera línea para prolactinoma (micro y macro): cabergolina (agonista dopaminérgico). Normaliza PRL y reduce el tamaño en >85% de casos. Cirugía solo si resistencia o intolerancia.',
    'Síndrome de la silla turca vacía: herniación de aracnoides en la silla turca → imagen de "silla vacía" en RM. Generalmente no requiere tratamiento.',
    'Apoplejía hipofisaria: hemorragia o infarto dentro de un adenoma → cefalea brusca, oftalmoplejia, hipopituitarismo agudo. Urgencia neuroquirúrgica.',
    'Craneofaringioma: tumor benigno de la región selar (restos de la bolsa de Rathke). Calcificaciones supraselares en Rx/TC. Más frecuente en niños y adultos jóvenes.'
   ],
   flashcards:[
    {q:'¿Cuál es el orden correcto de restitución hormonal en panhipopituitarismo?',a:'Cortisol primero (crisis vital si no se trata) → tiroxina → hormonas gonadales → GH al final.'},
    {q:'¿Qué marcador confirma remisión bioquímica en acromegalia y cuál es el valor de corte?',a:'IGF-1 normal para edad/sexo + GH <1 ng/mL en CTOG (algunos criterios modernos <0.4 ng/mL).'},
    {q:'Primera línea farmacológica en hiperprolactinemia por microadenoma y su mecanismo',a:'Cabergolina: agonista dopaminérgico D2. Suprime la síntesis y secreción de PRL, reduce el tamaño tumoral.'},
    {q:'¿Cómo diferencias prolactinoma verdadero de "efecto de tallo"?',a:'Efecto de tallo: PRL raramente >150 ng/mL (compresión del tallo interrumpe la dopamina). Prolactinoma: PRL generalmente >200 ng/mL.'},
    {q:'¿Qué es la apoplejía hipofisaria y cómo se presenta?',a:'Hemorragia/infarto dentro de un adenoma hipofisario. Cefalea explosiva brusca + oftalmoplejia (III par) + hipopituitarismo agudo. Urgencia neuroquirúrgica.'}
   ],
   quiz:[
    {q:'Mujer de 28 años con amenorrea secundaria de 8 meses, galactorrea bilateral y cefalea frontal leve. PRL = 185 ng/mL, TSH normal. RM: nódulo selar de 8 mm sin extensión supraselar. ¿Diagnóstico y tratamiento de primera línea?',
     opts:['Hipotiroidismo primario → levotiroxina','Microadenoma hipofisario productor de PRL → cabergolina','Macroadenoma no funcionante → cirugía transesfenoidal','Efecto de tallo → observación'],
     ans:1,fb:'Microprolactinoma: lesión <1 cm + PRL >100 ng/mL + clínica compatible. El hipotiroidismo eleva TRH que estimula PRL, pero TSH es normal. El tratamiento de elección es cabergolina, no cirugía.'},
    {q:'Hombre de 42 años con prognatismo progresivo, manos y pies grandes, hiperhidrosis y DM2 de reciente diagnóstico. GH basal = 14 ng/mL, IGF-1 = 680 ng/mL (VN <300). Tras CTOG, GH nadir = 3.2 ng/mL. ¿Diagnóstico?',
     opts:['Gigantismo hipofisario','Acromegalia confirmada','Síndrome de Nelson','Hiperprolactinemia con efecto paracrino'],
     ans:1,fb:'Acromegalia: IGF-1 elevado + GH que no suprime (<1 ng/mL) tras CTOG. El gigantismo es en niños (antes del cierre epifisario). IGF-1 es el marcador de seguimiento; GH es fluctuante.'},
    {q:'Paciente con acromegalia tratada con cirugía transesfenoidal. Posoperatorio: IGF-1 persiste en 480 ng/mL. ¿Cuál es el siguiente paso?',
     opts:['Repetir cirugía de inmediato','Análogo de somatostatina (octreotida o lanreotida)','Radioterapia hipofisaria como única opción','Solo vigilancia con RM anual'],
     ans:1,fb:'Si la cirugía no logra remisión, el siguiente paso son los análogos de somatostatina. Normalisan GH/IGF-1 en ~55% de los casos. La radioterapia es una tercera línea. Pegvisomant (antagonista de receptor de GH) se usa si hay resistencia a análogos.'},
    {q:'Hombre de 55 años con cefalea intensa de inicio brusco, ptosis palpebral derecha y diplopía. RM de urgencia: masa selar hemorrágica. ¿Diagnóstico y manejo inmediato?',
     opts:['Meningitis bacteriana → antibióticos IV','Apoplejía hipofisaria → hidrocortisona IV + evaluación neuroquirúrgica urgente','Aneurisma de la arteria comunicante posterior → embolización','Migraña complicada → analgésicos'],
     ans:1,fb:'Apoplejía hipofisaria: cefalea explosiva + compromiso de III par (ptosis+diplopía) + masa selar hemorrágica en RM. El riesgo inmediato es la insuficiencia suprarrenal aguda → hidrocortisona IV empírica PRIMERO. Luego decisión neuroquirúrgica.'},
    {q:'RM cerebral de un adulto sano por cefalea muestra una silla turca con imagen de "cojín de agua" en su interior, sin masa visible. PRL, GH, cortisol y tiroides normales. ¿Diagnóstico?',
     opts:['Microadenoma no funcionante','Craneofaringioma quístico','Síndrome de la silla turca vacía primaria','Quiste de la bolsa de Rathke'],
     ans:2,fb:'Silla turca vacía primaria: herniación del espacio subaracnoideo a través del diafragma selar. La hipófisis es normal y funciona bien. No requiere tratamiento si la función es normal. Es un hallazgo incidental frecuente.'}
   ]
  },
  {id:'di',title:'Diabetes insípida y neoplasias hipofisarias',badge:'b-endo',badgeLabel:'Endocrino',meta:'~1 h · Cap. 391 · Harrison 22e',
   resumen:[
    'La diabetes insípida (DI) es la incapacidad de concentrar la orina, resultando en poliuria hipotónica (osmolaridad urinaria <300 mOsm/kg) y polidipsia compensatoria.',
    'DI central: déficit de ADH (vasopresina) por daño del hipotálamo o la neurohipófisis. Causas: tumores (craneofaringioma, metástasis), traumatismo, cirugía hipofisaria, autoinmune, idiopática.',
    'DI nefrogénica: ADH está presente pero el riñón no responde. Causas: litio (más frecuente en adultos), hipercalcemia, hipokalemia crónica, enfermedad tubular.',
    'Diagnóstico diferencial de DI central vs. nefrogénica: prueba de privación de agua supervisada → si orina no se concentra → administrar desmopresina: central responde, nefrogénica no.',
    'Polidipsia primaria (psicogénica): beber compulsivo de agua → dilución del plasma → sodio plasmático bajo o normal. Se diferencia de DI por osmolaridad plasmática baja.',
    'Tratamiento DI central: desmopresina (análogo de ADH) intranasal, sublingual u oral. Educación sobre riesgo de hiponatremia por sobre-tratamiento.',
    'Tratamiento DI nefrogénica: tratar causa (suspender litio si posible); tiazidas paradójicamente reducen poliuria; AINEs pueden ayudar.',
    'Adenomas hipofisarios: los no funcionantes (cromófobos) son los más frecuentes. Presentan síntomas por efecto de masa: hemianopsia bitemporal, hipopituitarismo.',
    'Clasificación de adenomas funcionantes: somatotrófico (GH, acromegalia), corticotrófico (ACTH, Cushing), tireotrófico (TSH, hipertiroidismo), gonadotrófico (raro), prolactinoma (PRL).',
    'Todos los adenomas hipofisarios sintomáticos se tratan con cirugía transesfenoidal, EXCEPTO el prolactinoma donde el tratamiento médico con cabergolina es primera línea.',
    'Craneofaringioma: tumor benigno derivado de restos de la bolsa de Rathke. Calcificaciones en región supraselar en TC. Causa hipopituitarismo, DI y alteraciones visuales.',
    'Diabetes insípida posoperatoria: complicación frecuente tras cirugía transesfenoidal. Puede seguir patrón trifásico: DI inicial → SIADH → DI permanente.'
   ],
   flashcards:[
    {q:'Diferencia en osmolaridad plasmática entre DI central y polidipsia primaria',a:'DI central: osmolaridad plasmática ALTA (>295 mOsm/kg) con orina hipotónica. Polidipsia primaria: osmolaridad plasmática BAJA o normal por exceso de ingesta hídrica.'},
    {q:'¿Cuál es la prueba para distinguir DI central de nefrogénica?',a:'Prueba de privación de agua (deshidratación supervisada) seguida de desmopresina. Central: orina se concentra tras desmopresina. Nefrogénica: no se concentra.'},
    {q:'Tratamiento de primera línea de DI central',a:'Desmopresina (DDAVP): análogo sintético de ADH con mayor duración y sin efecto vasopresor. Disponible intranasal, sublingual u oral.'},
    {q:'¿Cuál es el adenoma hipofisario que NO se opera de primera intención?',a:'Prolactinoma: primera línea es cabergolina (agonista dopaminérgico). La cirugía se reserva para resistencia, intolerancia o compresión visual aguda.'},
    {q:'Patrón trifásico de DI postoperatoria tras cirugía hipofisaria',a:'Fase 1: DI (días 1-4, necrosis de axones). Fase 2: SIADH (días 5-7, liberación de ADH almacenada). Fase 3: DI permanente (si >80% de neuronas destruidas).'}
   ],
   quiz:[
    {q:'Hombre de 45 años, post-TEC. Diuresis de 8 L/día, osmolaridad urinaria 75 mOsm/kg, osmolaridad plasmática 310 mOsm/kg, Na+ 152 mEq/L. Tras desmopresina intranasal, osmolaridad urinaria sube a 680 mOsm/kg. ¿Diagnóstico?',
     opts:['Polidipsia primaria psicogénica','DI nefrogénica por TEC','DI central post-traumática','SIADH con compensación paradójica'],
     ans:2,fb:'DI central: osmolaridad plasmática alta + orina hipotónica + RESPUESTA a desmopresina (concentra la orina). La polidipsia primaria tendría osmolaridad plasmática baja. La DI nefrogénica no respondería a desmopresina.'},
    {q:'Mujer de 35 años con diagnóstico de trastorno bipolar en tratamiento con litio desde hace 3 años. Presenta polidipsia y poliuria de 6 L/día. Osmolaridad plasmática 296 mOsm/kg. Tras privación de agua no concentra la orina. Tras desmopresina tampoco concentra. ¿Diagnóstico?',
     opts:['DI central por efecto del litio sobre hipotálamo','DI nefrogénica inducida por litio','Polidipsia primaria por trastorno bipolar','SIADH paradójico por litio'],
     ans:1,fb:'Litio es la causa más frecuente de DI nefrogénica adquirida en adultos. Bloquea los receptores V2 en los túbulos colectores → incapacidad de responder a ADH. La orina no se concentra ni con desmopresina (riñón no responde).'},
    {q:'Paciente de 28 años con cefalea y pérdida visual bitemporal progresiva de 4 meses. RM: masa supraselar con componentes quísticos y calcificaciones. ¿Diagnóstico más probable?',
     opts:['Macroadenoma hipofisario no funcionante','Craneofaringioma','Meningioma del tubérculo selar','Metástasis supraselar'],
     ans:1,fb:'Craneofaringioma: tumor benigno supraselar con calcificaciones (hallazgo casi patognomónico en TC), componentes quísticos, más frecuente en adultos jóvenes y niños. El macroadenoma hipofisario rara vez calcifica.'},
    {q:'Paciente operado de macroadenoma hipofisario vía transesfenoidal. Al día 2 posoperatorio: poliuria de 5 L/día, Na+ 148, orina diluida. Al día 6: oliguria, Na+ 128. ¿Cuál es la explicación fisiopatológica?',
     opts:['Insuficiencia suprarrenal postoperatoria','Patrón trifásico: DI inicial seguida de SIADH por liberación de ADH almacenada','Fuga de LCR con pérdida de sodio','Recuperación espontánea del eje hipotálamo-hipofisario'],
     ans:1,fb:'Patrón trifásico clásico postoperatorio: Fase 1 (DI por daño axonal), Fase 2 (SIADH por liberación masiva de ADH almacenada en axones en degeneración), posible Fase 3 (DI permanente). El manejo debe anticipar esta secuencia.'},
    {q:'Mujer de 22 años psiquiátrica que bebe compulsivamente agua. Na+ 132 mEq/L, osmolaridad plasmática 272 mOsm/kg, osmolaridad urinaria 85 mOsm/kg. ¿Diagnóstico?',
     opts:['DI central leve','DI nefrogénica','Polidipsia primaria (psicogénica)','SIADH por psicofármacos'],
     ans:2,fb:'Polidipsia primaria: ingesta compulsiva de agua → dilución del plasma → hiponatremia leve + osmolaridad plasmática BAJA (272 mOsm/kg). En DI, la osmolaridad plasmática estaría alta. SIADH tendría orina concentrada (osmolaridad urinaria >100 con osmolaridad plasmática baja).'}
   ]

  {id:'supra',title:'Suprarrenales: Cushing, Addison e hiperaldosteronismo',badge:'b-endo',badgeLabel:'Endocrino',meta:'~1.5 h · Caps. 395–397 · Harrison 22e',
   resumen:[
    'La corteza suprarrenal produce mineralocorticoides (aldosterona, zona glomerulosa), glucocorticoides (cortisol, zona fascicular) y andrógenos (DHEA, zona reticular).',
    'Insuficiencia suprarrenal primaria (Enfermedad de Addison): destrucción de la corteza → déficit de cortisol Y aldosterona. Causa más frecuente en países desarrollados: autoinmune.',
    'Clínica de Addison: astenia, hipotensión, hiponatremia, hiperkalemia, hipoglucemia e hiperpigmentación (ACTH elevada estimula melanocitos). Anorexia, náusea, dolor abdominal.',
    'Insuficiencia suprarrenal secundaria: déficit de ACTH (hipofisaria) → solo déficit de cortisol (aldosterona intacta). Sin hiperpigmentación, sin hiperkalemia. Causa más frecuente: suspensión brusca de glucocorticoides exógenos.',
    'Crisis adrenal: colapso hemodinámico, vómito, fiebre. Precipitada por estrés (infección, cirugía) en paciente con reserva suprarrenal comprometida. Tratamiento: hidrocortisona 100 mg IV stat.',
    'Síndrome de Cushing endógeno: causa más frecuente = adenoma hipofisario ACTH-secretor (Enfermedad de Cushing, 70%). También: adenoma suprarrenal, carcinoma suprarrenal, ACTH ectópica (cáncer de pulmón de células pequeñas).',
    'Clínica de Cushing: obesidad central, cara de luna llena, joroba de búfalo, estrías violáceas anchas, hirsutismo, miopatía proximal, HTA, DM2, osteoporosis, infecciones oportunistas.',
    'Diagnóstico de Cushing: tamizaje con cortisol libre urinario 24h (×2) o cortisol salival nocturno (×2) o test de supresión con 1 mg de dexametasona nocturna. Confirmación: test de 2 días con 2 mg. Localización: ACTH plasmática.',
    'Hiperaldosteronismo primario (síndrome de Conn): hipersecreción autónoma de aldosterona → HTA resistente + hipokalemia espontánea + renina suprimida. Causa: adenoma suprarrenal (60%) o hiperplasia bilateral (40%).',
    'Diagnóstico de Conn: relación aldosterona/ARP >30 (tamizaje). Confirmar con sobrecarga de sal. TC suprarrenal. Cateterismo de venas suprarrenales (CVS) para lateralización antes de cirugía.',
    'Tratamiento de Conn: adenoma unilateral → adrenalectomía laparoscópica. Hiperplasia bilateral → espironolactona o eplerenona de por vida.',
    'Feocromocitoma: tumor de la médula suprarrenal (cromafín) → exceso de catecolaminas. Regla de los 10%: 10% bilateral, 10% extra-suprarrenal, 10% maligno. Dx: metanefrinas fraccionadas en orina/plasma.'
   ],
   flashcards:[
    {q:'¿Por qué hay hiperpigmentación en Addison pero NO en insuficiencia suprarrenal secundaria?',a:'En Addison la ACTH es muy alta (estimula melanocitos vía POMC). En secundaria, la ACTH está baja, por eso no hay hiperpigmentación.'},
    {q:'¿Por qué no hay hiperkalemia en la insuficiencia suprarrenal secundaria?',a:'Porque la aldosterona (mineralocorticoide) es controlada por el sistema renina-angiotensina, NO por ACTH. En insuficiencia secundaria, la aldosterona está intacta.'},
    {q:'Test de tamizaje inicial para síndrome de Cushing (3 opciones)',a:'(1) Cortisol libre urinario en 24h ×2; (2) Cortisol salival nocturno ×2; (3) Test de supresión con 1 mg de dexametasona nocturna (cortisol matutino <1.8 μg/dL = normal).'},
    {q:'Tríada de sospecha de hiperaldosteronismo primario',a:'HTA resistente + hipokalemia espontánea (o fácilmente inducible con diuréticos) + aldosterona elevada con ARP suprimida.'},
    {q:'Tratamiento de la crisis adrenal aguda',a:'Hidrocortisona 100 mg IV en bolo stat, luego 50-100 mg c/6-8h + solución salina al 0.9% (1-2L rápido) + glucosa si hay hipoglucemia. No esperar resultados de laboratorio.'}
   ],
   quiz:[
    {q:'Paciente de 38 años con astenia marcada, hipotensión ortostática, Na+ 124 mEq/L, K+ 6.1 mEq/L, glucosa 58 mg/dL y piel con hiperpigmentación en pliegues y cicatrices. ACTH = 1350 pg/mL. ¿Diagnóstico y tratamiento de urgencia?',
     opts:['Insuficiencia suprarrenal secundaria → hidrocortisona oral','Enfermedad de Addison → hidrocortisona 100 mg IV stat + solución salina','Síndrome de Cushing ectópico → resección tumoral','Hiperaldosteronismo primario → espironolactona'],
     ans:1,fb:'Addison con crisis adrenal: ACTH muy elevada + hiperpigmentación + hiponatremia + HIPERKALEMIA (pérdida de mineralocorticoides) + hipoglucemia. Tratamiento inmediato: hidrocortisona IV + SF. La insuficiencia secundaria no cursa con hiperkalemia.'},
    {q:'Mujer de 42 años con HTA resistente a 3 fármacos, K+ 2.8 mEq/L espontáneo, aldosterona 32 ng/dL, ARP 0.2 ng/mL/h (relación A/ARP = 160). TC suprarrenal: nódulo izquierdo de 1.4 cm. ¿Cuál es el siguiente paso diagnóstico ANTES de operar?',
     opts:['Operar directamente basándose en el TC','Cateterismo de venas suprarrenales para lateralización','Iniciar espironolactona y evaluar respuesta','RM suprarrenal con gadolinio'],
     ans:1,fb:'El TC puede mostrar incidentalomas contralaterales falsos. El CVS es el gold standard para confirmar lateralización antes de adrenalectomía. Si hay hipersecreción unilateral confirmada → cirugía. Si es bilateral → espironolactona/eplerenona.'},
    {q:'Paciente con cara de luna llena, estrías violáceas abdominales de 2 cm, miopatía proximal, DM2 y osteoporosis a los 38 años. Cortisol urinario libre 24h = 380 μg/24h (VN <90). ACTH plasmática = 85 pg/mL (moderadamente elevada). ¿Cuál es la causa más probable?',
     opts:['Adenoma suprarrenal productor de cortisol','Enfermedad de Cushing (adenoma hipofisario ACTH-secretor)','Síndrome de ACTH ectópica por carcinoma de células pequeñas','Cushing iatrogénico por corticoides exógenos'],
     ans:1,fb:'ACTH moderadamente elevada (no suprimida) orienta a causa dependiente de ACTH. La causa más frecuente de Cushing ACTH-dependiente es la Enfermedad de Cushing (adenoma hipofisario, 70%). En el síndrome ectópico, la ACTH suele ser muy alta (>200 pg/mL) y el inicio es más abrupto.'},
    {q:'Hombre de 55 años con HTA grave, cefalea episódica, palpitaciones y diaforesis paroxística. PA 185/110 mmHg en crisis. Metanefrinas urinarias fraccionadas muy elevadas. TC: masa suprarrenal derecha de 4 cm. ¿Diagnóstico y precaución preoperatoria crítica?',
     opts:['Adenoma suprarrenal productor de cortisol → resección directa','Feocromocitoma → bloqueo alfa-adrenérgico PRIMERO (fenoxibenzamina) antes de cirugía','Carcinoma suprarrenal → resección más quimioterapia','Hiperaldosteronismo primario → espironolactona preoperatoria'],
     ans:1,fb:'Feocromocitoma: síntomas paroxísticos (cefalea+palpitaciones+diaforesis) + metanefrinas elevadas + masa suprarrenal. NUNCA operar sin bloqueo alfa previo (fenoxibenzamina o doxazosina 10-14 días) para prevenir crisis hipertensiva intraoperatoria por manipulación tumoral.'},
    {q:'Paciente con sospecha de síndrome de Cushing. Test de supresión con 1 mg de dexametasona nocturna: cortisol matutino = 4.2 μg/dL. ¿Cómo interpretas este resultado y qué sigue?',
     opts:['Resultado normal (Cushing descartado), no se necesita más estudio','Resultado positivo (no supresión), confirmar con cortisol libre urinario 24h ×2 o test de 2 días con 2 mg','Resultado indeterminado, repetir con 2 mg de dexametasona la misma noche','Proceder directamente a RM hipofisaria'],
     ans:1,fb:'Corte: <1.8 μg/dL = supresión normal (Cushing improbable). ≥1.8 μg/dL = no supresión = resultado positivo de tamizaje. Se requiere confirmación con una segunda prueba (cortisol urinario ×2 o test de 2 días) antes de estudios de localización (ACTH, RM).'}
   ]
  },
  {id:'hyperadreno',title:'Hiperadrenocorticismo (síndrome de Cushing)',badge:'b-endo',badgeLabel:'Endocrino',meta:'~1.5 h · Cap. 396 · Harrison 22e',
   resumen:[
    'El síndrome de Cushing es el conjunto de manifestaciones clínicas derivadas de la exposición crónica a glucocorticoides en exceso, ya sea exógena o endógena.',
    'Causa más frecuente GLOBAL: administración exógena de corticosteroides (iatrogénica). Es siempre el primer diagnóstico a descartar antes de estudiar causa endógena.',
    'Causas endógenas dependientes de ACTH (80%): adenoma hipofisario ACTH-secretor "Enfermedad de Cushing" (70%) y síndrome de ACTH ectópica (carcinoma de células pequeñas de pulmón, carcinoma medular de tiroides, tumores carcinoides, 10%).',
    'Causas endógenas independientes de ACTH (20%): adenoma suprarrenal productor de cortisol (unilateral), carcinoma suprarrenal (raro, produce andrógenos también), hiperplasia suprarrenal macronodular bilateral.',
    'Clínica característica: obesidad central con extremidades delgadas (miopatía), cara de luna llena, joroba de búfalo (lipodosis supraclavicular y dorsocervical), estrías violáceas anchas (>1 cm en abdomen y muslos), pletora facial, equimosis fácil.',
    'Manifestaciones metabólicas y sistémicas: HTA, DM2 (resistencia a insulina), osteoporosis (fracturas vertebrales), infecciones oportunistas (por inmunosupresión), dislipidemia, hipercoagulabilidad (TVP/TEP), trastornos psiquiátricos (depresión, psicosis).',
    'Tamizaje bioquímico (se deben realizar ≥2 pruebas): (1) cortisol libre urinario en 24h ×2 (>3× VN = muy sugestivo), (2) cortisol salival nocturno ×2 (alta sensibilidad), (3) test de supresión nocturna con 1 mg de dexametasona (cortisol matutino ≥1.8 μg/dL = positivo).',
    'Confirmación y localización: ACTH plasmática a las 8 am. Si ACTH suprimida (<5 pg/mL) → causa suprarrenal autónoma → TC suprarrenal. Si ACTH normal-elevada → causa dependiente de ACTH → RM hipofisaria. Si RM negativa → cateterismo de senos petrosos inferiores.',
    'Síndrome de ACTH ectópica: inicio más abrupto, ACTH muy elevada (>200 pg/mL), hipopotasemia marcada (el exceso de cortisol activa receptores mineralocorticoides), alcalosis metabólica, hiperpigmentación, poca obesidad (por caquexia tumoral).',
    'Carcinoma suprarrenal: produce cortisol + andrógenos → Cushing + virilización en mujeres. Masa suprarrenal grande (>6 cm), heterogénea, invasiva. Pronóstico muy malo. Tratamiento: adrenalectomía + mitotane.',
    'Tratamiento definitivo de Enfermedad de Cushing: cirugía transesfenoidal (remisión en 70-80% de microadenomas). Si falla: radioterapia hipofisaria, adrenalectomía bilateral (precaución: síndrome de Nelson), ketoconazol/metirapona como puente.',
    'Síndrome de Nelson: crecimiento agresivo del adenoma hipofisario residual tras adrenalectomía bilateral (sin retroalimentación negativa del cortisol). Hiperpigmentación severa + déficits neurológicos. Prevención: radioterapia hipofisaria previa a adrenalectomía.'
   ],
   flashcards:[
    {q:'¿Cuál es la causa más frecuente de síndrome de Cushing en la práctica clínica?',a:'Administración exógena de corticosteroides (iatrogénica). Siempre descartarla primero. Entre las causas ENDÓGENAS, la más frecuente es la Enfermedad de Cushing (adenoma hipofisario ACTH-secretor, 70%).'},
    {q:'¿Cómo diferencias bioquímicamente la Enfermedad de Cushing del síndrome de ACTH ectópica?',a:'Enfermedad de Cushing: ACTH moderadamente elevada (20-200 pg/mL), supresión con dexametasona a dosis altas (2 mg c/6h × 2 días), RM hipofisaria positiva en 60%. ACTH ectópica: ACTH muy elevada (>200 pg/mL), NO suprime con dosis altas, hipopotasemia marcada.'},
    {q:'¿Qué es el síndrome de Nelson y cómo se previene?',a:'Crecimiento agresivo del adenoma hipofisario corticotrófico residual tras adrenalectomía bilateral (sin retroalimentación negativa del cortisol). Se previene con radioterapia hipofisaria antes de adrenalectomía.'},
    {q:'Diferencia clínica entre estrías del Cushing y estrías del embarazo/obesidad',a:'Cushing: estrías VIOLÁCEAS (color rojo-vinoso), anchas (>1 cm), abdomen y raíz de muslos. Embarazo/obesidad: estrías rosadas o blancas nacaradas, menos anchas. El color violáceo intenso es altamente sugestivo de Cushing.'},
    {q:'¿Cuál es el test de localización cuando la RM hipofisaria es NEGATIVA en Cushing ACTH-dependiente?',a:'Cateterismo bilateral de senos petrosos inferiores (CSPI): se mide ACTH en sangre venosa petrosa vs. periférica. Gradiente central/periférico >2 basal o >3 tras CRH = origen hipofisario. Sin gradiente = ACTH ectópica.'}
   ],
   quiz:[
    {q:'Mujer de 38 años con HTA, DM2 de inicio reciente, aumento de 18 kg en 8 meses (obesidad central), estrías violáceas de 2 cm en abdomen y equimosis espontáneas. Cortisol salival nocturno elevado ×2. ACTH plasmática = 95 pg/mL. RM hipofisaria: microadenoma de 6 mm. ¿Diagnóstico?',
     opts:['Síndrome de ACTH ectópica por tumor carcinoide','Adenoma suprarrenal productor de cortisol','Enfermedad de Cushing (adenoma hipofisario ACTH-secretor)','Cushing iatrogénico por corticoides exógenos'],
     ans:2,fb:'Enfermedad de Cushing: ACTH moderadamente elevada (dependiente de ACTH) + RM con microadenoma hipofisario + clínica florida de hipercortisolismo. El adenoma suprarrenal tendría ACTH suprimida (<5 pg/mL). El Cushing iatrogénico tendría ACTH suprimida y antecedente de uso de esteroides.'},
    {q:'Hombre de 55 años con pérdida de peso de 8 kg en 6 semanas, hiperpigmentación, HTA severa, K+ 2.6 mEq/L, alcalosis metabólica. ACTH = 450 pg/mL. Cortisol urinario 24h = 2800 μg. TC tórax: masa hiliar derecha de 3 cm. ¿Diagnóstico más probable?',
     opts:['Enfermedad de Cushing grave','Síndrome de ACTH ectópica por carcinoma de células pequeñas de pulmón','Adenoma suprarrenal bilateral','Carcinoma suprarrenal con metástasis pulmonar'],
     ans:1,fb:'ACTH ectópica: inicio abrupto + caquexia (por tumor) + ACTH muy elevada (>200 pg/mL) + hipopotasemia severa (el cortisol en exceso activa receptores mineralocorticoides → pérdida de K+) + alcalosis + masa pulmonar. La Enfermedad de Cushing rara vez causa hipopotasemia tan marcada.'},
    {q:'Paciente con Enfermedad de Cushing por microadenoma hipofisario. Se realizó cirugía transesfenoidal y al día 3 posoperatorio cortisol = 1.2 μg/dL. ¿Qué indica este resultado y cuál es el manejo?',
     opts:['Fracaso de la cirugía → reoperar de inmediato','Remisión bioquímica (supresión del cortisol) → hidrocortisona de reemplazo temporal hasta recuperar el eje suprarrenal','Resultado normal esperado → no requiere manejo','Síndrome de Nelson incipiente → radioterapia inmediata'],
     ans:1,fb:'Cortisol posoperatorio <2 μg/dL = remisión bioquímica (el hipotálamo-hipófisis normal estaba suprimido por el exceso crónico de cortisol y necesita tiempo para recuperarse). Se debe iniciar hidrocortisona de reemplazo (15-25 mg/día) para evitar insuficiencia suprarrenal grave. La recuperación del eje puede tardar 6-24 meses.'},
    {q:'Mujer con sospecha de Cushing. Test de supresión con 1 mg dexametasona nocturna: cortisol matutino = 5.8 μg/dL. Cortisol libre urinario 24h = 210 μg (VN <90). ACTH = 3 pg/mL (suprimida). TC suprarrenal: nódulo derecho de 2.8 cm hipervascular. ¿Diagnóstico?',
     opts:['Enfermedad de Cushing con falso negativo en RM','Síndrome de ACTH ectópica oculta','Adenoma suprarrenal productor de cortisol (Cushing independiente de ACTH)','Hipercortisolismo por obesidad (pseudo-Cushing)'],
     ans:2,fb:'ACTH suprimida (<5 pg/mL) + hipercortisolismo bioquímico + nódulo suprarrenal unilateral = adenoma suprarrenal autónomo. El adenoma produce cortisol de forma autónoma, suprimiendo la ACTH hipofisaria. Tratamiento: adrenalectomía laparoscópica unilateral + hidrocortisona posoperatoria (el eje contralateral estaba suprimido).'},
    {q:'Paciente con Cushing grave tratado con adrenalectomía bilateral. A los 18 meses desarrolla hiperpigmentación severa, cefalea y deterioro visual. RM: masa selar de 3 cm con extensión supraselar. ¿Diagnóstico?',
     opts:['Metástasis hipofisaria','Síndrome de Nelson por adenoma corticotrófico agresivo post-adrenalectomía bilateral','Craneofaringioma de aparición tardía','Recidiva de Cushing por remanente suprarrenal'],
     ans:1,fb:'Síndrome de Nelson: tras adrenalectomía bilateral, el adenoma hipofisario corticotrófico residual crece agresivamente al perder la retroalimentación negativa del cortisol → masa invasiva + hiperpigmentación extrema (ACTH muy elevada). Tratamiento: cirugía hipofisaria + radioterapia. Se previene con radioterapia hipofisaria antes de la adrenalectomía.'}
   ]
  },
  {id:'hipoaldo',title:'Hipoaldosteronismo',badge:'b-endo',badgeLabel:'Endocrino',meta:'~1 h · Cap. 395 · Harrison 22e',
   resumen:[
    'El hipoaldosteronismo es la deficiencia de aldosterona o resistencia a su acción, resultando en pérdida de sodio, retención de potasio y acidosis metabólica hiperclorémica.',
    'Clasificación: (1) Hipoaldosteronismo primario: falla de la glándula suprarrenal para producir aldosterona. (2) Hipoaldosteronismo hiporreninémico (tipo IV de acidosis tubular renal): renina baja → aldosterona baja. (3) Pseudohipoaldosteronismo: resistencia tubular a la aldosterona.',
    'Hipoaldosteronismo hiporreninémico (HH): la causa más frecuente de hipoaldosteronismo en la práctica clínica. Ocurre en pacientes con nefropatía diabética, nefritis intersticial crónica o uso de AINEs y β-bloqueadores. La renina baja reduce la producción de angiotensina II → aldosterona baja.',
    'Presentación clínica del HH: hiperkalemia desproporcionada al grado de insuficiencia renal + acidosis metabólica hiperclorémica (anion gap normal, pH <7.35, HCO3 bajo) + normonatremia o hiponatremia leve. Sin hipotensión ortostática marcada (porque el cortisol está intacto).',
    'Diagnóstico diferencial de hiperkalemia con acidosis metabólica: HH (renina baja + aldosterona baja) vs. Addison (ACTH elevada + cortisol bajo + hiperpigmentación) vs. pseudohipoaldosteronismo (renina y aldosterona altas, resistencia tubular).',
    'Nefropatía diabética como causa de HH: el daño del aparato yuxtaglomerular reduce la secreción de renina → eje SRAA suprimido. Muy frecuente en DM2 con TFG 30-60 mL/min.',
    'Fármacos que causan o agravan hipoaldosteronismo: IECA/ARA-II (bloquean angiotensina II → reducen aldosterona), heparina (inhibe la síntesis suprarrenal de aldosterona), ketoconazol, espironolactona/eplerenona (antagonistas de receptor), AINEs (reducen renina), β-bloqueadores (reducen renina).',
    'Pseudohipoaldosteronismo tipo 1 (PHA1): resistencia a la aldosterona por mutación en el receptor mineralocorticoide o en los canales ENaC. Renina y aldosterona muy elevadas (compensación). Clínica severa en neonatos: hiponatremia, hiperkalemia, acidosis, deshidratación, shock.',
    'Tratamiento del HH: restricción dietética de potasio + diuréticos que promuevan excreción de K+ (furosemida, tiazidas) + tratar la causa subyacente. En algunos casos, fludrocortisona (mineralocorticoide sintético) a dosis bajas si hay hiperkalemia refractaria.',
    'Hipoaldosteronismo en contexto postoperatorio: adrenalectomía por adenoma de Conn → la glándula contralateral estaba suprimida por retroalimentación → hipoaldosteronismo transitorio posoperatorio. Tratar con fludrocortisona temporalmente.',
    'Acidosis tubular renal tipo IV (ATR-IV): es la presentación bioquímica del HH. Anion gap normal + hiperkalemia + bicarbonato bajo. La hiperkalemia de la ATR-IV inhibe la amoniagenesis renal → acumula H+. A diferencia de ATR tipos I y II, el pH urinario puede ser <5.5.',
    'Gravedad de la hiperkalemia en HH: generalmente moderada (K+ 5.5-6.5 mEq/L), rara vez >7 mEq/L a menos que haya desencadenante agudo (infección, ayuno, fármacos). Monitoreo electrocardiográfico si K+ >6 mEq/L: ondas T picudas, ensanchamiento QRS, fibrilación ventricular.'
   ],
   flashcards:[
    {q:'¿Cuál es la causa más frecuente de hipoaldosteronismo en la práctica clínica y en qué contexto ocurre?',a:'Hipoaldosteronismo hiporreninémico (HH): daño del aparato yuxtaglomerular (nefropatía diabética, nefritis intersticial) → renina baja → angiotensina II baja → aldosterona baja. Se presenta como ATR tipo IV.'},
    {q:'Tríada bioquímica del hipoaldosteronismo hiporreninémico',a:'(1) Hiperkalemia desproporcionada al grado de IRC, (2) Acidosis metabólica hiperclorémica (anion gap normal, ATR tipo IV), (3) Renina plasmática baja + aldosterona baja (diferencia del Addison donde ACTH está elevada).'},
    {q:'¿Cómo diferencias HH de pseudohipoaldosteronismo en laboratorio?',a:'HH: renina BAJA + aldosterona BAJA (déficit de producción). Pseudohipoaldosteronismo: renina ALTA + aldosterona MUY ALTA (resistencia tubular → compensación suprarrenal). Ambos cursan con hiperkalemia y acidosis.'},
    {q:'Tres fármacos de uso común que pueden causar o agravar hipoaldosteronismo',a:'(1) IECA/ARA-II (bloquean angiotensina II → reducen síntesis de aldosterona), (2) Heparina (inhibe la síntesis suprarrenal de aldosterona directamente), (3) AINEs (reducen la síntesis de prostaglandinas que estimulan la renina).'},
    {q:'Tratamiento del hipoaldosteronismo hiporreninémico con hiperkalemia sintomática',a:'Restricción de K+ en dieta + suspender fármacos que elevan K+ (IECA, ARA-II, heparina) + furosemida (promueve excreción de K+ y Na+). Si refractario: fludrocortisona 0.05-0.1 mg/día (monitorizar HTA y edema).'}
   ],
   quiz:[
    {q:'Diabético tipo 2 de 62 años con nefropatía (TFG 38 mL/min, creatinina 2.1). Laboratorio rutinario: K+ 6.2 mEq/L, HCO3 18 mEq/L, Na+ 138, cloro 112 mEq/L, pH 7.29. Sin síntomas. Aldosterona baja, actividad de renina plasmática (ARP) baja. ¿Diagnóstico?',
     opts:['Insuficiencia renal aguda con acidosis urémca','Hipoaldosteronismo hiporreninémico (ATR tipo IV) por nefropatía diabética','Enfermedad de Addison con IRC concomitante','Pseudohipoaldosteronismo tipo 1'],
     ans:1,fb:'HH: diabético con nefropatía leve-moderada + hiperkalemia DESPROPORCIONADA al grado de IRC (TFG 38 no explicaría K+ 6.2 solo) + acidosis hiperclorémica (anion gap = 138-(112+18) = 8, normal) + renina y aldosterona bajas. El Addison tiene ACTH elevada, cortisol bajo e hiperpigmentación. El pseudohipoaldosteronismo tiene aldosterona y renina muy altas.'},
    {q:'Mujer de 45 años con LES en tratamiento con AINEs crónicos y candesartán. Control: K+ 6.5 mEq/L, HCO3 17 mEq/L, pH 7.27. ECG: ondas T picudas en derivaciones precordiales. TFG 55 mL/min. ¿Cuál es la intervención más prioritaria?',
     opts:['Iniciar fludrocortisona inmediatamente','Suspender AINEs y ARA-II + gluconato de calcio IV si hay cambios ECG significativos + kayexalate o patiromer','Diálisis de urgencia','Solo restricción dietética de K+ y observación'],
     ans:1,fb:'Hiperkalemia sintomática con cambios ECG por fármacos (AINEs reducen renina + ARA-II bloquean angiotensina II → ambos reducen aldosterona). Manejo urgente: si hay cambios ECG → gluconato de calcio IV (estabiliza membrana), luego suspender fármacos causales, resinas de intercambio (patiromer, SPS), diuréticos. La diálisis es para hiperkalemia refractaria.'},
    {q:'Neonato de 5 días con vómito, deshidratación severa, hiponatremia (Na+ 118), hiperkalemia (K+ 7.8), acidosis metabólica. Aldosterona muy elevada (800 pg/mL), renina muy elevada. Cortisol normal. ¿Diagnóstico?',
     opts:['Insuficiencia suprarrenal primaria (Addison neonatal)','Pseudohipoaldosteronismo tipo 1 (resistencia a aldosterona)','Hiperplasia suprarrenal congénita por déficit de 21-hidroxilasa','Hipoaldosteronismo hiporreninémico neonatal'],
     ans:1,fb:'Pseudohipoaldosteronismo tipo 1: aldosterona y renina MUY ALTAS (compensación máxima) pero el riñón no responde (mutación en receptor mineralocorticoide o canal ENaC). A diferencia de la hiperplasia suprarrenal congénita, el cortisol es normal. El HH tendría aldosterona y renina bajas. Tratamiento: suplementación de sodio + resinas de intercambio.'},
    {q:'Paciente sometido a adrenalectomía laparoscópica izquierda por adenoma de Conn confirmado. A los 3 días posoperatorios: K+ 5.8 mEq/L, HCO3 19 mEq/L. Sin fludrocortisona. PA 130/85 mmHg. ¿Explicación y manejo?',
     opts:['Hiperaldosteronismo persistente por hiperplasia contralateral → reintervención','Hipoaldosteronismo posoperatorio transitorio (glándula contralateral suprimida) → fludrocortisona temporal + monitoreo de K+','Insuficiencia suprarrenal total → hidrocortisona IV urgente','Resultado esperado, no requiere tratamiento'],
     ans:1,fb:'Tras adrenalectomía por adenoma de Conn, la glándula suprarrenal contralateral estaba suprimida crónicamente por el exceso de aldosterona → hipoaldosteronismo transitorio posoperatorio (semanas a meses). Tratamiento: fludrocortisona 0.1 mg/día + dieta rica en sodio hasta que el eje se recupere. El cortisol está intacto (solo aldosterona afectada).'},
    {q:'Hombre de 70 años con ICC en tratamiento con enalapril, espironolactona y furosemida. Control mensual: K+ 6.8 mEq/L, HCO3 16 mEq/L. ECG urgente: ondas T picudas V2-V4, PR prolongado. ¿Mecanismo y manejo inmediato?',
     opts:['Insuficiencia renal aguda por hipoperfusión → expansión de volumen','Hipoaldosteronismo farmacológico (IECA + espironolactona) con hiperkalemia grave con cambios ECG → gluconato de calcio IV + suspender espironolactona + considerar kayexalate o diálisis','Hiperkalemia por dieta → solo restricción de K+','Pseudohipoaldosteronismo tipo 2 → tiazidas'],
     ans:1,fb:'Combinación IECA + espironolactona es una causa clásica de hiperkalemia grave en ICC (ambos bloquean el eje aldosterónico). Con cambios ECG: gluconato de calcio IV 10 mL al 10% (estabiliza membrana cardiaca en 2-3 min), luego insulin+glucosa (traslada K+ al intracelular), suspender espironolactona y revisar IECA. La furosemida en este contexto puede estar ayudando (excreta K+).'}
   ]

  {id:'gonadas',title:'Gónadas: hipogonadismo, ginecomastia y disfunción eréctil',badge:'b-endo',badgeLabel:'Endocrino',meta:'~0.5 h · Cap. 400 · Harrison 22e',
   resumen:[
    'El eje hipotálamo-hipófisis-gonadal: GnRH hipotalámica (pulsátil) → FSH y LH hipofisarias → testosterona/estradiol gonadales + retroalimentación negativa.',
    'Hipogonadismo primario (hipergonadotrópico): falla gonadal → testosterona baja + FSH/LH ALTAS (respuesta compensatoria). Causas: Klinefelter, orquitis, quimioterapia, criptorquidia.',
    'Hipogonadismo secundario (hipogonadotrópico): falla hipotálamo-hipofisaria → testosterona baja + FSH/LH BAJAS o inapropiadamente normales. Causas: prolactinoma, Kallmann, anorexia, exceso de ejercicio.',
    'Síndrome de Klinefelter (47,XXY): causa más frecuente de hipogonadismo primario masculino. Testículos pequeños y firmes, azoospermia, ginecomastia, estatura alta. FSH muy elevada.',
    'Síndrome de Kallmann: hipogonadismo hipogonadotrópico congénito + anosmia (déficit de GnRH + migración anómala de neuronas olfatorias). Diagnóstico clínico: hipogonadismo + anosmia.',
    'Ginecomastia: proliferación benigna del tejido glandular mamario masculino. Causas: pubertad (fisiológica), cirrosis (conversión periférica de andrógenos a estrógenos), fármacos (espironolactona, cimetidina, digoxina, antipsicóticos, marihuana, ketoconazol).',
    'Disfunción eréctil (DE): causa vascular es la más frecuente (aterosclerosis de arterias pudendas). Factores de riesgo: DM, HTA, dislipidemia, tabaquismo, obesidad.',
    'Evaluación de DE: historia clínica + testosterona total matutina + glucosa + lípidos + TSH. Cuestionario IIEF.',
    'Tratamiento de DE: modificar factores de riesgo + inhibidores de fosfodiesterasa-5 (sildenafil, tadalafil). Contraindicados con nitratos (hipotensión severa).',
    'Infertilidad masculina: azoospermia obstructiva (FSH normal) vs. secretora (FSH elevada). Estudio: espermograma completo.',
    'Hipogonadismo en mujer: insuficiencia ovárica prematura (<40 años) → sofocos, amenorrea, FSH muy elevada. Tratamiento: terapia hormonal sustitutiva.',
    'Disfunción eréctil como marcador cardiovascular: la DE puede preceder en 2-5 años a un evento cardiovascular mayor. Siempre evaluar riesgo CV.'
   ],
   flashcards:[
    {q:'¿Cómo diferenciar hipogonadismo primario de secundario en laboratorio?',a:'Primario: testosterona baja + FSH/LH ALTAS (falla gonadal, compensación hipofisaria). Secundario: testosterona baja + FSH/LH BAJAS o normales (falla hipotálamo-hipofisaria).'},
    {q:'Síndrome de Klinefelter: cariotipo, hallazgos clínicos y laboratorio',a:'47,XXY. Testículos pequeños y firmes, azoospermia, ginecomastia, talla alta. FSH y LH muy elevadas (hipogonadismo primario). Dx confirmatorio: cariotipo.'},
    {q:'Síndrome de Kallmann: qué es y cómo se diferencia de otras causas de hipogonadismo secundario',a:'Hipogonadismo hipogonadotrópico congénito + ANOSMIA (déficit de neuronas GnRH + neuronas olfatorias). Sin anosmia, se llama hipogonadismo hipogonadotrópico idiopático.'},
    {q:'Tres fármacos de uso común que causan ginecomastia',a:'Espironolactona (bloquea receptor androgénico), cimetidina (bloquea receptor androgénico), digoxina (efecto estrogénico). También: antipsicóticos (elevan PRL), ketoconazol, marihuana.'},
    {q:'¿Por qué los inhibidores de PDE-5 están contraindicados con nitratos?',a:'Ambos producen vasodilatación vía GMPc. Su combinación causa hipotensión severa potencialmente fatal. Contraindicación absoluta.'}
   ],
   quiz:[
    {q:'Hombre de 25 años infértil. Exploración: talla 188 cm, testículos 4 mL bilaterales (pequeños y firmes), ginecomastia. Laboratorio: FSH 48 UI/L, LH 32 UI/L, testosterona 180 ng/dL. Espermograma: azoospermia. ¿Diagnóstico confirmatorio?',
     opts:['RM hipofisaria para descartar macroadenoma','Cariotipo (confirma Klinefelter 47,XXY)','Biopsia testicular de urgencia','Prueba de estimulación con HCG'],
     ans:1,fb:'Klinefelter clásico: testículos pequeños/firmes + azoospermia + ginecomastia + FSH/LH muy elevadas (hipogonadismo primario) + talla alta. El diagnóstico se confirma con cariotipo. La RM hipofisaria es para hipogonadismo hipogonadotrópico (LH/FSH bajas).'},
    {q:'Joven de 18 años sin desarrollo puberal, sin vello púbico ni axilar. Testículos 3 mL. FSH 1.2 UI/L, LH 0.8 UI/L, testosterona 50 ng/dL. Relata que desde pequeño tiene dificultad para detectar olores. ¿Diagnóstico?',
     opts:['Síndrome de Klinefelter','Retraso constitucional del desarrollo','Síndrome de Kallmann','Prolactinoma con compresión del eje gonadal'],
     ans:2,fb:'Síndrome de Kallmann: hipogonadismo hipogonadotrópico (FSH/LH bajas + testosterona baja) + ANOSMIA congénita. Es la combinación característica. El retraso constitucional es un diagnóstico de exclusión y no incluye anosmia.'},
    {q:'Hombre de 55 años cirrótico (Child-Pugh B). Refiere ginecomastia bilateral dolorosa de 6 meses. No toma fármacos de ningún tipo. Testosterona total: 280 ng/dL. ¿Mecanismo de la ginecomastia?',
     opts:['Prolactinoma concomitante','Conversión periférica aumentada de andrógenos a estrógenos en el tejido graso y hepático disfuncional','Déficit de receptor androgénico adquirido','Efecto directo del alcohol sobre la hipófisis'],
     ans:1,fb:'En la cirrosis hay: disminución del metabolismo hepático de estrógenos + aumento de la SHBG que une preferentemente testosterona → reducción de testosterona libre + aumento relativo de estrógenos. Esto causa ginecomastia sin necesidad de fármacos.'},
    {q:'Diabético de 62 años con DE de 1 año de evolución, sin respuesta a sildenafil 100 mg. Testosterona matutina = 180 ng/dL (baja). ¿Cuál es el paso siguiente más apropiado?',
     opts:['Cambiar a tadalafil como única medida','Medir LH y FSH para clasificar el hipogonadismo y considerar terapia de reemplazo con testosterona','Derivar directamente a urología para implante de prótesis','Iniciar vardenafil sin más estudios'],
     ans:1,fb:'Testosterona baja + DE: siempre medir LH/FSH para clasificar (primario vs. secundario) antes de reemplazar. La terapia con testosterona puede mejorar la respuesta a PDE-5i en hipogonadismo. Además, descartar prolactinoma si LH/FSH también están bajas.'},
    {q:'Mujer de 36 años con amenorrea de 8 meses, sofocos intensos y dispareunia. Embarazos 2, partos 2. FSH = 68 UI/L, estradiol <20 pg/mL. Cariotipo 46,XX. ¿Diagnóstico?',
     opts:['Menopausia fisiológica','Insuficiencia ovárica prematura (IOP)','Síndrome de Asherman','Hiperprolactinemia con supresión ovárica'],
     ans:1,fb:'Insuficiencia ovárica prematura: falla ovárica antes de los 40 años + FSH >25 UI/L (dos determinaciones) + amenorrea ≥4 meses. No es menopausia (es <40 años). Causas: autoinmune, iatrogénica (QT/RT), genética (premutación FMR1), idiopática.'}
   ]
  },
  {id:'cardio',title:'Cardiopatías congénitas en adulto y síndromes de preexcitación',badge:'b-cardio',badgeLabel:'Cardio',meta:'~1.5 h · Caps. 256, 280 · Harrison 22e',
   resumen:[
    'Coartación de aorta: estenosis congénita de la aorta, generalmente yuxtaductal. HTA en MMSS con hipotensión en MMII, pulsos femorales débiles o ausentes, soplo sistólico interescapular.',
    'Signo de Roesler: erosiones en el borde inferior de los arcos costales 3°-8° visibles en Rx de tórax, por dilatación de arterias intercostales colaterales.',
    'Diagnóstico de coartación: ecocardiografía, angioTC o angioRM. Tratamiento: angioplastia con stent (adultos) o resección quirúrgica.',
    'CIA (comunicación interauricular): cortocircuito izquierda-derecha. Tipo ostium secundum (75%, región de la fosa oval) es el más frecuente. Soplo sistólico en foco pulmonar + desdoblamiento FIJO de S2.',
    'CIV (comunicación interventricular): soplo holosistólico áspero paraesternal izquierdo bajo. Las pequeñas pueden cerrar espontáneamente. Las grandes causan hipertensión pulmonar (síndrome de Eisenmenger si se invierten).',
    'Síndrome de Eisenmenger: cortocircuito izquierda-derecha que se invierte por hipertensión pulmonar severa → cortocircuito derecha-izquierda → cianosis central. Contraindicación para cirugía de cierre.',
    'Tetralogía de Fallot: cuatro componentes: CIV + aorta cabalgante + estenosis pulmonar + hipertrofia de VD. La más frecuente de las cardiopatías congénitas cianóticas. Rx: corazón en "bota".',
    'Conducto arterioso persistente (CAP): soplo continuo "en maquinaria" infranclavicular izquierdo. En prematuros: indometacina para cierre. En adultos: cierre percutáneo o quirúrgico.',
    'Síndrome de WPW: vía accesoria auriculoventricular (haz de Kent) que permite conducción anterógrada. ECG: PR corto (<120 ms) + onda delta + QRS ancho.',
    'WPW + FA: la vía accesoria puede conducir el impulso a frecuencias muy altas (>250 lpm) → riesgo de fibrilación ventricular. CONTRAINDICADOS: adenosina, digital, verapamilo y betabloqueadores (bloquean nodo AV y favorecen conducción exclusiva por vía accesoria).',
    'Tratamiento agudo de WPW + taquicardia hemodinámica comprometida: cardioversión eléctrica. Estable: procainamida o flecainida IV.',
    'Tratamiento definitivo de WPW sintomático: ablación con radiofrecuencia (catéter), éxito >95%, prácticamente curativa.'
   ],
   flashcards:[
    {q:'¿Cuál es el hallazgo radiológico patognomónico de la coartación de aorta?',a:'Signo de Roesler: erosiones en el borde inferior de los arcos costales 3°-8° por dilatación de arterias intercostales colaterales. También: signo del "3" en aorta.'},
    {q:'Tríada ECG del síndrome de WPW y su fisiopatología',a:'PR corto (<120 ms) + onda delta (preexcitación ventricular por vía accesoria) + QRS ancho. La vía accesoria (haz de Kent) conduce más rápido que el nodo AV.'},
    {q:'¿Por qué están contraindicados adenosina, digital y verapamilo en WPW + FA?',a:'Bloquean el nodo AV → el impulso se conduce exclusivamente por la vía accesoria a frecuencias >300 lpm → FV. El tratamiento es procainamida IV o cardioversión eléctrica.'},
    {q:'Hallazgo auscultatorio cardinal de la CIA y por qué es fijo',a:'Desdoblamiento FIJO del S2: el shunt izquierda-derecha produce sobrecarga crónica del VD y retraso constante del cierre pulmonar, independientemente de la respiración.'},
    {q:'¿Qué es el síndrome de Eisenmenger y por qué contraindica la cirugía de cierre?',a:'Inversión del cortocircuito (izquierda-derecha → derecha-izquierda) por hipertensión pulmonar severa. Si se cierra el defecto, el VD no puede superar la resistencia pulmonar → fallo agudo del VD y muerte.'}
   ],
   quiz:[
    {q:'Hombre de 32 años con HTA en brazos (165/105 mmHg), PA en piernas 90/70 mmHg, soplo sistólico interescapular y pulsos femorales débiles. Rx tórax: muesca en borde inferior de arcos costales 4°-7°. ¿Diagnóstico y siguiente paso?',
     opts:['Disección aórtica tipo A → cirugía de urgencia','Coartación de aorta → angioTC aórtica para planificar intervención','Estenosis aórtica grave → ecocardiografía transtorácica','Insuficiencia aórtica → ecocardiografía'],
     ans:1,fb:'Coartación de aorta: gradiente de presión MMSS > MMII + soplo interescapular + signo de Roesler. El siguiente paso es angioTC para definir anatomía y planificar angioplastia con stent. La disección aórtica es aguda y dolorosa, sin este patrón crónico.'},
    {q:'Mujer de 28 años con hallazgo incidental de soplo. ECG: desdoblamiento fijo de S2, soplo sistólico en foco pulmonar. Eco: defecto en región de fosa oval de 18 mm con cortocircuito izquierda-derecha. ¿Diagnóstico y conducta?',
     opts:['CIV pequeña → observación','CIA tipo ostium secundum → cierre percutáneo con dispositivo (Amplatzer)','CAP → indometacina','Estenosis pulmonar valvular → valvuloplastia'],
     ans:1,fb:'CIA tipo ostium secundum (75% de las CIA): defecto en la fosa oval + desdoblamiento fijo de S2 + soplo en foco pulmonar. Si hay repercusión hemodinámica (Qp/Qs >1.5:1 o dilatación de cavidades derechas): cierre percutáneo con dispositivo. Cirugía si anatomía no favorable.'},
    {q:'Joven de 22 años con palpitaciones frecuentes. ECG en ritmo sinusal: PR 90 ms, QRS 130 ms con empastamiento inicial (onda delta). Durante taquicardia: FC 280 lpm, QRS ancho e irregular. ¿Diagnóstico del ritmo y manejo inmediato?',
     opts:['Flutter auricular → adenosina IV','WPW con FA con conducción anterógrada por vía accesoria → cardioversión eléctrica o procainamida IV','TSVP por reentrada nodal → adenosina IV','Taquicardia ventricular polimórfica → amiodarona IV'],
     ans:1,fb:'WPW + FA con conducción anterógrada: FC altísima (>250 lpm) + QRS ancho irregular (diagnóstico diferencial con TV). La adenosina y digoxina están CONTRAINDICADOS → FV. Si estable: procainamida IV. Si inestable: cardioversión eléctrica inmediata. Tratamiento definitivo: ablación.'},
    {q:'Paciente de 35 años con tetralogía de Fallot reparada a los 3 años. Ahora con disnea, síncope y soplo de insuficiencia pulmonar grave. Eco: VD severamente dilatado. ¿Complicación tardía y manejo?',
     opts:['Endocarditis infecciosa → antibióticos','Insuficiencia pulmonar grave post-reparación → sustitución valvular pulmonar','Hipertensión pulmonar → sildenafil','Re-estenosis pulmonar → valvuloplastia con balón'],
     ans:1,fb:'Complicación más frecuente a largo plazo de la reparación de tetralogía de Fallot: insuficiencia pulmonar grave por parche transanular → sobrecarga crónica de VD → dilatación y disfunción → síncope/muerte súbita. Tratamiento: reemplazo de válvula pulmonar (biológica o pulmonar homóloga).'},
    {q:'Hombre de 45 años con síndrome de WPW conocido, asintomático hasta ahora. En estudio electrofisiológico: periodo refractario efectivo de la vía accesoria de 210 ms. ¿Cuál es la conducta más apropiada?',
     opts:['Observación sin tratamiento por ser asintomático','Ablación con radiofrecuencia profiláctica (PRE <250 ms indica alto riesgo)','Amiodarona profiláctica de por vida','Marcapasos bicameral preventivo'],
     ans:1,fb:'PRE de la vía accesoria <250 ms indica que puede conducir a frecuencias >250 lpm si hay FA → riesgo de FV y muerte súbita. Aunque sea asintomático, el riesgo justifica ablación profiláctica, especialmente en adultos jóvenes activos o con profesiones de riesgo.'}
   ]
  },
  {id:'peri',title:'Pericarditis, miocarditis y taponamiento cardiaco',badge:'b-cardio',badgeLabel:'Cardio',meta:'~1 h · Caps. 268, 281 · Harrison 22e',
   resumen:[
    'Pericarditis aguda: inflamación del pericardio. Causa más frecuente: viral (Coxsackie B, echovirus, adenovirus). También: autoinmune, tuberculosa, urémica, post-IAM.',
    'Clínica de pericarditis: dolor torácico pleurítico que empeora en decúbito y MEJORA al inclinarse hacia adelante. Roce pericárdico (trifásico: sístole + diástole auricular + llenado ventricular rápido).',
    'ECG en pericarditis: supradesnivel difuso del ST en "silla de montar" (cóncavo hacia arriba) en múltiples derivaciones + descenso del intervalo PR. Diferencia del IAM: no recíproco, no en V1.',
    'Tratamiento de pericarditis viral: AINEs (ibuprofeno 600 mg c/8h) + colchicina (reduce recurrencias). Reposo relativo. Corticoides solo si hay contraindicación a AINEs (aumentan riesgo de cronicidad).',
    'Pericarditis constrictiva: fibrosis y calcificación del pericardio → restricción al llenado. Clínica: IC derecha (ingurgitación yugular, hepatomegalia, ascitis) con pulmones limpios. Signo de Kussmaul.',
    'Taponamiento cardiaco: acumulación de líquido pericárdico que aumenta la presión intrapericárdica → colapso de cavidades derechas → obstrucción al llenado → choque obstructivo.',
    'Tríada de Beck del taponamiento: hipotensión + ruidos cardiacos apagados + ingurgitación yugular. Pulso paradójico >10 mmHg (caída de PAS durante inspiración).',
    'Diagnóstico de taponamiento: ecocardiografía (colapso de aurícula y ventrículo derechos en diástole). El taponamiento es clínico-ecocardiográfico, no radiológico.',
    'Tratamiento del taponamiento: pericardiocentesis urgente (guiada por eco). Diuréticos CONTRAINDICADOS (reducen precarga y empeoran el choque). NO dar vasodilatadores.',
    'Miocarditis: inflamación del miocardio. Causas: viral (Coxsackie B más frecuente), autoinmune, farmacológica (ciclofosfamida, antracíclicos), enfermedad de Chagas.',
    'Clínica de miocarditis: disnea, dolor torácico, fiebre, palpitaciones. Troponina elevada. ECG: cambios inespecíficos del ST. Eco: disfunción sistólica global.',
    'Diagnóstico de miocarditis: RM cardiaca con gadolinio (gold standard clínico): realce tardío en zona MEDIA del miocardio (a diferencia del IAM: subendocárdico). Biopsia endomiocárdica en casos graves o refractarios.'
   ],
   flashcards:[
    {q:'¿Cuál es la posición que alivia el dolor de la pericarditis aguda y por qué?',a:'Sentado e inclinado hacia adelante (30-45°): reduce el contacto entre el pericardio inflamado y la pleura parietal posterior, disminuyendo el dolor pleurítico.'},
    {q:'Diferencia ECG entre pericarditis aguda e IAM anterolateral',a:'Pericarditis: supradesnivel DIFUSO (múltiples derivaciones), ST cóncavo (silla de montar), descenso de PR, sin cambios recíprocos. IAM: supradesnivel focal, ST convexo, ondas Q, cambios recíprocos.'},
    {q:'Tríada de Beck y pulso paradójico en el taponamiento',a:'Tríada de Beck: hipotensión + ruidos apagados + ingurgitación yugular. Pulso paradójico: caída de PAS >10 mmHg en inspiración (el VD comprimido desplaza el septo hacia el VI).'},
    {q:'¿Por qué están contraindicados los diuréticos en el taponamiento cardiaco?',a:'El taponamiento es un choque obstructivo que depende de precarga. Los diuréticos reducen el retorno venoso → empeoran el llenado cardiaco → agravamiento del shock. El tratamiento es pericardiocentesis.'},
    {q:'Gold standard diagnóstico de miocarditis y su hallazgo característico',a:'RM cardiaca con gadolinio: realce tardío en la zona MEDIA del miocardio (no subendocárdico como el IAM, no subepicárdico como la pericarditis). Puede mostrar edema miocárdico con T2-STIR.'}
   ],
   quiz:[
    {q:'Hombre de 28 años con dolor torácico brusco que empeora en decúbito y mejora al sentarse. Fiebre 38.2°C, FC 95 lpm. ECG: supradesnivel del ST cóncavo en DI, DII, aVF, V3-V6 + descenso del PR. Troponina levemente elevada (0.08 ng/mL). ¿Diagnóstico y tratamiento?',
     opts:['IAM con elevación del ST → activar código infarto + angioplastia primaria','Pericarditis aguda viral → ibuprofeno 600 mg c/8h + colchicina','Miocarditis aguda → inmunosupresión inmediata','Disección aórtica → angioTC de urgencia'],
     ans:1,fb:'Pericarditis aguda: dolor pleurítico + fiebre + ECG difuso cóncavo + descenso de PR. La troponina puede elevarse levemente por miopericarditis. El tratamiento es AINEs + colchicina. El IAM tiene ST focal, convexo, cambios recíprocos y no mejora con la posición.'},
    {q:'Paciente tratada por pericarditis viral hace 3 semanas. Regresa con disnea progresiva de 5 días, PAS 78 mmHg, PAS en inspiración 58 mmHg, ingurgitación yugular, ruidos cardiacos apagados. Eco: efusión circunferencial con colapso de AD en diástole. ¿Paso inmediato?',
     opts:['Furosemida IV 80 mg para reducir la congestión','Pericardiocentesis ecoguiada de urgencia','Metilprednisolona IV para pericarditis recurrente','Noradrenalina para mantener la presión arterial como única medida'],
     ans:1,fb:'Taponamiento cardiaco: tríada de Beck + pulso paradójico marcado (38 mmHg) + colapso de AD en eco. Es una emergencia. Pericardiocentesis inmediata. Los diuréticos están CONTRAINDICADOS. La noradrenalina puede usarse como puente, pero el tratamiento definitivo es el drenaje.'},
    {q:'Mujer de 35 años con antecedente de pericarditis tuberculosa hace 2 años. Ahora con ingurgitación yugular severa, hepatomegalia pulsátil, ascitis, edema en MMII y pulmones LIMPIOS en auscultación. Eco: pericardio engrosado y calcificado, disfunción diastólica restrictiva. ¿Diagnóstico?',
     opts:['Insuficiencia cardiaca congestiva por miocardiopatía dilatada','Pericarditis constrictiva crónica','Taponamiento cardiaco subagudo','Cirrosis hepática con hipertensión portal'],
     ans:1,fb:'Pericarditis constrictiva: IC derecha (IY + hepatomegalia + ascitis) con pulmones LIMPIOS (diferencia de IC izquierda). Pericardio calcificado en eco/TC. Signo de Kussmaul (IY que aumenta en inspiración). Tratamiento: pericardiectomía quirúrgica.'},
    {q:'Joven de 24 años deportista con dolor torácico, disnea y palpitaciones 2 semanas después de un síndrome gripal. Troponina I = 2.8 ng/mL, ECG: bloqueo AV de primer grado, alteraciones difusas del ST. Eco: FE 35%, sin derrame. ¿Gold standard diagnóstico?',
     opts:['Biopsia endomiocárdica inmediata','RM cardiaca con gadolinio (realce tardío en zona media del miocardio)','Angiografía coronaria para descartar IAM','PET cardiaco con FDG'],
     ans:1,fb:'Miocarditis aguda: post-viral + troponina elevada + disfunción sistólica + bloqueo AV. La RM cardiaca es el gold standard CLÍNICO: realce tardío en zona media (intramural), edema en T2-STIR. La biopsia endomiocárdica es gold standard histológico pero solo en casos refractarios o necesidad de diagnóstico etiológico urgente.'},
    {q:'Paciente masculino de 45 años con pericarditis aguda viral. Se le prescribe ibuprofeno 600 mg c/8h. ¿Qué medicamento se debe agregar siempre y cuál es su beneficio?',
     opts:['Prednisona 1 mg/kg para reducir inflamación más rápido','Colchicina 0.5 mg c/12h por 3 meses para reducir el riesgo de recurrencia','Warfarina para prevenir trombosis pericárdica','Amiodarona profiláctica por riesgo de arritmias'],
     ans:1,fb:'Colchicina (0.5 mg c/12h, 3 meses en primer episodio) reduce el riesgo de recurrencia de pericarditis del 30% al 10-15% (estudio COPE). Es el estándar de cuidado junto con AINEs. Los corticoides AUMENTAN el riesgo de cronicidad y recurrencia (se usan solo si contraindicación a AINEs).'}
   ]
