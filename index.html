 [
  {id:'poli',title:'Poliquistosis renal y litiasis renoureteral',badge:'b-nefro',badgeLabel:'Nefro',meta:'~1.5 h · Caps. 327, 330 · Harrison 22e',
   resumen:[
    'PQRAD (poliquistosis renal autosómica dominante): mutación en PKD1 (85%, cromosoma 16, codifica policistina-1) o PKD2 (15%, cromosoma 4, policistina-2). PKD1 tiene evolución más rápida a IRCT.',
    'Fisiopatología: las policistinas forman un complejo en el cilio primario que regula el calcio intracelular. Su disfunción → proliferación celular anormal → formación de quistes en todas las nefronas.',
    'Clínica de PQRAD: masa abdominal bilateral palpable, dolor lumbar crónico, hematuria (por rotura de quiste o litiasis), HTA (compresión de arteriolas → activación SRAA), ITUs recurrentes, IRC progresiva.',
    'Manifestaciones extrarenales de PQRAD: aneurismas intracraneales (10%), quistes hepáticos (80%, no afectan función), quistes pancreáticos y espénicos, prolapso de válvula mitral, hernia inguinal.',
    'Tamizaje de aneurismas intracraneales: RM cerebral en pacientes con historia personal o familiar de hemorragia subaracnoidea o profesión de alto riesgo. NO en todos los pacientes.',
    'Diagnóstico de PQRAD: ecocardiografía renal (criterios de Ravine por edad). Genético si hay duda diagnóstica o donante renal vivo.',
    'Tolvaptán: antagonista del receptor V2 de ADH → inhibe el AMP cíclico que promueve la proliferación quística. Enlentece la progresión en PQRAD con TFG >25 mL/min y crecimiento renal rápido. Riesgo de hepatotoxicidad.',
    'Litiasis renal: composición más frecuente: oxalato de calcio (75%), seguido de fosfato de calcio, ácido úrico (radiolúcido en Rx), estruvita y cistina.',
    'Cólico nefrítico: dolor lumbar unilateral intenso, irradiado a ingle y genitales, náusea, inquietud. Hematuria macroscópica o microscópica en 85%. Puede haber fiebre si hay obstrucción + infección (urgencia).',
    'Diagnóstico de litiasis aguda: TC abdominopélvica sin contraste (gold standard, sensibilidad 98%). La Rx simple muestra solo cálculos radiopacos. Eco renal: hidronefrosissin ver el cálculo ureteral.',
    'Tratamiento del cólico nefrítico: AINEs (ketorolaco IV, primera línea por su efecto antiinflamatorio sobre el uréter) + opiáceos si dolor intenso. Hidratación. Tamsulosina (alfa-bloqueante) para facilitar la expulsión.',
    'Indicaciones de intervención urgente en litiasis: obstrucción + infección (urosepsis), anuria, dolor refractario, cálculo >10 mm (baja probabilidad de expulsión espontánea).'
   ],
   flashcards:[
    {q:'Gen más frecuente en PQRAD, su cromosoma y producto proteico',a:'PKD1, cromosoma 16, codifica policistina-1 (proteína del cilio primario). Presente en 85% de casos. Evolución más agresiva que PKD2 (cromosoma 4, policistina-2).'},
    {q:'Complicación extrarrenal más grave de PQRAD y criterios para tamizaje con RM',a:'Aneurismas intracraneales (10%). Tamizaje con RM cerebral: solo si historia familiar/personal de HSA o profesión de alto riesgo (piloto, buzo). NO en todos los pacientes.'},
    {q:'¿Cuál cálculo renal es RADIOLÚCIDO en Rx simple y en qué contextos se forma?',a:'Cálculo de ácido úrico: radiolúcido (no se ve en Rx, sí en TC). Contextos: hiperuricemia, orina persistentemente ácida (pH <5.5), gota, síndrome metabólico, dieta rica en purinas.'},
    {q:'Tratamiento farmacológico de primera línea del cólico nefrítico agudo',a:'AINEs IV (ketorolaco): inhiben las prostaglandinas que mantienen la presión ureteral y la musculatura lisa espástica. + Tamsulosina para facilitar expulsión de cálculos <10 mm.'},
    {q:'¿Cuándo se indica intervención URGENTE en litiasis ureteral?',a:'Obstrucción + fiebre/infección (urosepsis = emergencia urológica), anuria bilateral, riñón único obstruido, dolor refractario a analgésicos, cálculo >10 mm (baja expulsión espontánea).'}
   ],
   quiz:[
    {q:'Hombre de 44 años con antecedente familiar de PQRAD (padre e hijo en diálisis). Quistes renales bilaterales múltiples, HTA de difícil control, Cr 1.9 mg/dL (TFG 42 mL/min). Eco cerebral: sin aneurismas. RM renal: volumen renal total 1850 mL. ¿Cuál es la intervención específica para retrasar la progresión?',
     opts:['ARA-II como única medida','Tolvaptán (criterios: TFG >25 + crecimiento renal rápido)','Diálisis peritoneal profiláctica','Nefrectomía bilateral profiláctica'],
     ans:1,fb:'Tolvaptán está indicado en PQRAD con TFG >25 mL/min y evidencia de progresión rápida (volumen renal total >750 mL o crecimiento >5% anual). El control estricto de la HTA (objetivo <130/80) también enlentece la progresión. Monitorizar enzimas hepáticas por hepatotoxicidad.'},
    {q:'Mujer de 38 años con dolor lumbar derecho agudo, náusea, hematuria macroscópica. TC sin contraste: cálculo de 4 mm en uréter distal derecho, sin dilatación significativa. Sin fiebre. ¿Conducta más apropiada?',
     opts:['Litotricia extracorpórea por ondas de choque inmediata','Manejo conservador: AINEs + tamsulosina + hidratación + seguimiento (90% expulsión espontánea <4 mm)','Ureteroscopía de urgencia','Nefrolitotomía percutánea'],
     ans:1,fb:'Cálculo <5 mm en uréter distal: probabilidad de expulsión espontánea >90%. Manejo ambulatorio con analgesia + tamsulosina + filtrar orina para recuperar el cálculo y analizar su composición. La intervención se reserva para fracaso de tratamiento conservador, obstrucción o infección.'},
    {q:'Hombre de 50 años con historia de ITUs a repetición, fiebre y dolor lumbar bilateral. Rx simple: imágenes opacas ramificadas que ocupan los sistemas colectores de ambos riñones. Urocultivo: Klebsiella pneumoniae. ¿Tipo de cálculo y mecanismo?',
     opts:['Oxalato de calcio por hipercalciuria absortiva','Estruvita por bacteria productora de ureasa que alcaliniza la orina','Ácido úrico por hiperuricemia crónica','Cistina por cistinuria hereditaria'],
     ans:1,fb:'Cálculo coraliforme de estruvita: bacterias ureasa+ (Klebsiella, Proteus, Pseudomonas) desdoblan la urea → amoniaco → pH urinario muy alcalino → precipita fosfato amónico magnésico (estruvita). Tratamiento: urología (nefrolitotomía percutánea) + antibiótico prolongado.'},
    {q:'Paciente con cólico nefrítico y TC que muestra cálculo ureteral de 9 mm + fiebre 39.5°C + escalofríos + hipotensión 90/60 mmHg. ¿Diagnóstico y manejo?',
     opts:['Hospitalizar, analgesia IV y esperar expulsión espontánea','Urosepsis por obstrucción: drenaje urgente (nefrostomía percutánea o catéter ureteral doble J) + antibióticos IV','Litotricia extracorpórea de urgencia','Alta con antibiótico oral y seguimiento ambulatorio en 1 semana'],
     ans:1,fb:'Obstrucción ureteral + infección = EMERGENCIA UROLÓGICA. La orina infectada proximal a la obstrucción puede causar urosepsis fulminante. Tratamiento: drenaje URGENTE (nefrostomía o doble J) + antibióticos IV (piperacilina-tazobactam o carbapenem). La litotricia está contraindicada en infección activa.'},
    {q:'Mujer de 28 años con cálculos renales recurrentes desde los 18 años. Análisis de cálculo expulsado: cistina. Na+ 138, K+ 4.1, Ca++ 9.8 (normal), ácido úrico normal. Orina 24h: cistina 450 mg (VN <250 mg/día). ¿Diagnóstico y tratamiento específico?',
     opts:['Hipercalciuria: tiazidas','Cistinuria: hidratación abundante + alcalinización urinaria (pH >7) + D-penicilamina o tiopronina si falla','Hiperuricosuria: alopurinol','Hiperoxaluria primaria: piridoxina'],
     ans:1,fb:'Cistinuria: trastorno autosómico recesivo del transporte de cistina y aminoácidos dibásicos en el riñón. Tratamiento: hidratación >3L/día + alcalinización (bicarbonato, citrato) para mantener pH urinario >7 (cistina es más soluble en orina alcalina). Si falla: D-penicilamina o tiopronina (forman complejos solubles con cistina).'}
   ]
  },
  {id:'onco',title:'Neoplasias renales, vesicales y prostáticas',badge:'b-nefro',badgeLabel:'Nefro',meta:'~1.5 h · Caps. 90–92 · Harrison 22e',
   resumen:[
    'Carcinoma renal de células claras (CRCC): tumor más frecuente del riñón (75%). Origen: epitelio tubular proximal. FR: tabaquismo, obesidad, HTA, enfermedad de Von Hippel-Lindau (VHL).',
    'Tríada clásica del CRCC: hematuria + dolor en flanco + masa palpable. Solo en 10% de los casos. La mayoría son incidentales en imagen.',
    'Síndromes paraneoplásicos del CRCC: eritrocitosis (EPO ectópica), hipercalcemia (PTHrP), HTA (renina ectópica), síndrome de Stauffer (disfunción hepática no metastásica), poliglobulia.',
    'Diagnóstico de CRCC: TC con contraste (masa que realza). Biopsia si hay duda diagnóstica. Estadificación: TC tórax-abdomen-pelvis. PET no es estándar.',
    'Tratamiento de CRCC localizado: nefrectomía parcial (si posible) o radical. CRCC metastásico: inhibidores de tirosina quinasa (sunitinib, pazopanib) o anti-PD-1/PD-L1 (nivolumab + ipilimumab).',
    'Cáncer de vejiga (CV): 90% carcinoma urotelial (transicional). Localización: vejiga (90%), pelvis renal, uréter, uretra. FR principal: TABAQUISMO (×4 riesgo, 50% de los casos).',
    'Otros FR del CV: anilinas aromáticas (tintoreros, pintores), ciclofosfamida (cistitis hemorrágica → CV), esquistosomiasis (carcinoma escamoso en países endémicos), fenacetina.',
    'Diagnóstico de CV: cistoscopia + biopsia (gold standard). Citología urinaria (alta especificidad para tumores de alto grado). TC urografía para vías urinarias superiores.',
    'Estadificación de CV: Ta-T1 (superficial) → resección transuretral (RTU) ± BCG intravesical. T2-T4 (músculo invasor) → cistectomía radical ± quimioterapia neoadyuvante (MVAC o gemcitabina-cisplatino).',
    'Cáncer de próstata (CP): más frecuente en hombres >50 años. FR: edad, raza afroamericana, historia familiar. Adenocarcinoma en zona periférica (80%) → detectable por TR.',
    'Tamizaje de CP: APE + tacto rectal anual desde los 50 años (45 años con FR). APE >4 ng/mL o TR sospechoso → biopsia transrectal ecoguiada (10-12 muestras).',
    'Clasificación de Gleason: suma de los 2 patrones más frecuentes (1-5 cada uno). Gleason 6 = bajo riesgo, vigilancia activa. Gleason 7 = riesgo intermedio. Gleason 8-10 = alto riesgo, tratamiento agresivo. CP metastásico: blanco son los huesos (osteoblásticas).'
   ],
   flashcards:[
    {q:'Factor de riesgo más importante del carcinoma urotelial de vejiga y porcentaje atribuible',a:'Tabaquismo: responsable del 50% de los casos, aumenta el riesgo ×4. Los carcinógenos de la orina (aminas aromáticas del humo) contactan directamente la mucosa vesical.'},
    {q:'Síndromes paraneoplásicos más frecuentes del carcinoma renal de células claras',a:'Eritrocitosis (EPO ectópica), hipercalcemia (PTHrP), HTA (renina ectópica), síndrome de Stauffer (hepatomegalia disfuncional sin metástasis). Desaparecen con nefrectomía.'},
    {q:'¿Cuál es la diferencia en estadificación de cáncer de vejiga superficial vs. músculo-invasor?',a:'Superficial (Ta, T1, Tis): resección transuretral (RTU) ± BCG intravesical. Músculo-invasor (≥T2): cistectomía radical + quimioterapia neoadyuvante basada en platino.'},
    {q:'¿Qué patrón de metástasis óseas produce el cáncer de próstata y cómo se diferencia del mieloma?',a:'CP: metástasis OSTEOBLÁSTICAS (blásticas, escleróticas en imagen, fosfatasa alcalina elevada). Mieloma: metástasis OSTEOLÍTICAS (líticas, calcio elevado, FA normal). CP: APE elevado.'},
    {q:'¿Qué significa Gleason 4+3=7 y cómo difiere de Gleason 3+4=7 en términos de pronóstico?',a:'El primer número es el patrón predominante. Gleason 4+3=7 tiene PEOR pronóstico que 3+4=7 porque el patrón 4 (más agresivo) predomina sobre el 3. Mismo suma, diferente biología.'}
   ],
   quiz:[
    {q:'Hombre de 58 años, fumador de 30 paquetes/año, sin síntomas. Eco abdominal de rutina: masa renal derecha de 4 cm heterogénea. TC con contraste: realce de la masa en fase arterial. Sin metástasis. ¿Diagnóstico probable y manejo?',
     opts:['Angiomiolipoma → observación si <4 cm','Carcinoma renal de células claras → nefrectomía parcial o radical','Oncocitoma → biopsia y vigilancia','Quiste renal complejo Bosniak II → seguimiento cada 6 meses'],
     ans:1,fb:'Masa renal sólida que realza con contraste en TC → carcinoma renal hasta demostrar lo contrario. Tratamiento estándar: nefrectomía parcial (preserva nefronas) si técnicamente posible. La biopsia preoperatoria no es rutinaria. Angiomiolipoma tiene grasa macroscópica (-10 UH en TC).'},
    {q:'Hombre de 68 años, fumador, con hematuria macroscópica indolora en 3 ocasiones en 2 meses. TC urografía: no se detecta masa vesical. Citología urinaria: células uroteliales atípicas. ¿Mejor siguiente paso?',
     opts:['Repetir citología en 3 meses','Cistoscopia con biopsia (gold standard para cáncer de vejiga)','Urocultivo y antibiótico empírico','RMN de vejiga con gadolinio'],
     ans:1,fb:'Hematuria macroscópica indolora en varón fumador = cáncer de vejiga hasta demostrar lo contrario. El TC puede no ver tumores planos (carcinoma in situ). La cistoscopia es el gold standard: permite visualización directa y biopsia. La citología positiva refuerza la sospecha pero no reemplaza la cistoscopia.'},
    {q:'Mujer de 45 años con historia de lupus, tratada con ciclofosfamida acumulada 30 g durante 3 años. Ahora con hematuria microscópica persistente y disuria. ¿Cuál es la complicación más probable y cómo se diagnostica?',
     opts:['Cistitis lúpica → corticoides','Cáncer de vejiga inducido por ciclofosfamida → cistoscopia + biopsia','Cistitis intersticial → urodinámica','Nefritis lúpica → biopsia renal'],
     ans:1,fb:'La ciclofosfamida es un carcinógeno urothelial demostrado: su metabolito acroleína irrita y daña la mucosa vesical → cistitis hemorrágica crónica → cáncer de vejiga (riesgo ×9). Se debe realizar cistoscopia de vigilancia. La profilaxis es con mesna (neutraliza acroleína).'},
    {q:'Hombre de 72 años con APE 18 ng/mL, tacto rectal con nódulo duro en lóbulo derecho. Biopsia: adenocarcinoma Gleason 4+5=9, afectación de 8/12 cilindros. Gammagrafía ósea: múltiples lesiones blásticas en columna y pelvis. ¿Tratamiento de primera línea?',
     opts:['Prostatectomía radical como único tratamiento','Deprivación androgénica (análogos LHRH) + abiraterona o enzalutamida (tratamiento combinado)','Radioterapia exclusiva de columna','Docetaxel como primera línea sin deprivación hormonal'],
     ans:1,fb:'CP metastásico sensible a castración: la combinación de deprivación androgénica (análogos LHRH o castración quirúrgica) + abiraterona (inhibe síntesis de andrógenos) o enzalutamida (bloquea receptor androgénico) prolonga la supervivencia global vs. deprivación sola (estudios LATITUDE, ARCHES). La prostatectomía no tiene rol en enfermedad metastásica.'},
    {q:'Hombre de 65 años con APE de 5.8 ng/mL. Biopsia: adenocarcinoma Gleason 3+3=6, afectación de 2/12 cilindros, APE 5.8. TR normal. Sin extensión extraprostática. ¿Cuál es la opción más apropiada para este paciente?',
     opts:['Prostatectomía radical inmediata','Deprivación androgénica inmediata','Vigilancia activa (APE cada 3-6 meses, biopsia anual)','Radioterapia externa inmediata'],
     ans:2,fb:'Gleason 6 = cáncer de próstata de muy bajo riesgo. La vigilancia activa (no espera vigilante pasiva) es el estándar: APE c/3-6 meses, TR anual, biopsia 12-18 meses. Evita sobretratamiento en tumores indolentes. La prostatectomía y radioterapia tienen morbilidad significativa (incontinencia, disfunción eréctil) sin beneficio demostrado en bajo riesgo.'}
   ]
  },
  {id:'eii',title:'EII: Crohn, colitis ulcerosa y colitis microscópica',badge:'b-gi',badgeLabel:'Digestivo',meta:'~1.5 h · Cap. 338 + Cap. 139 · Harrison 22e',
   resumen:[
    'La EII incluye la enfermedad de Crohn (EC) y la colitis ulcerosa (CU), ambas con activación inmune anormal ante la flora intestinal en sujetos genéticamente susceptibles.',
    'Colitis ulcerosa (CU): inflamación continua desde el recto hacia proximal, limitada estrictamente a la mucosa. Nunca afecta el intestino delgado. Extensión: proctitis (E1), colitis izquierda (E2), pancolitis (E3).',
    'Clínica de CU: diarrea con sangre y moco, tenesmo, urgencia defecatoria, cólico. En brotes graves: fiebre, taquicardia, anemia, hipoalbuminemia.',
    'Enfermedad de Crohn (EC): inflamación transmural (todas las capas), discontinua (skip lesions), puede afectar cualquier segmento desde boca hasta ano. Más frecuente: íleon terminal.',
    'Características histológicas de Crohn: granulomas no caseosos (30-60% de biopsias), fisuras, fístulas, patrón en empedrado endoscópico, ulceraciones aftosas.',
    'Diferencias clave EC vs. CU: EC = transmural + discontinua + granulomas + fístulas + perianal + íleon. CU = mucosa + continua + desde recto + sin granulomas. Solo CU cura con colectomía.',
    'Megacolon tóxico: complicación grave de CU (y EC). Dilatación del colon transverso >6 cm + toxicidad sistémica. Manejo: hospitalización + corticoides IV + descomprimir + cirugía si no mejora en 48-72h.',
    'Manifestaciones extraintestinales de EII: artritis periférica (paralela a actividad), espondilitis anquilosante (independiente), eritema nodoso, pioderma gangrenoso, uveítis, colangitis esclerosante primaria (más en CU).',
    'Tratamiento de CU: mesalazina (5-ASA) para inducción y mantenimiento en enfermedad leve-moderada. Corticoides para brotes. Biológicos (anti-TNF: infliximab, adalimumab; vedolizumab; ustekinumab) para enfermedad moderada-grave.',
    'Colitis pseudomembranosa: infección por Clostridioides difficile. Factores de riesgo: antibióticos (especialmente clindamicina, cefalosporinas, fluoroquinolonas), hospitalización, edad >65, IBP.',
    'Diagnóstico de C. difficile: toxina A y B en heces (inmunoensayo enzimático) o PCR de toxinas (más sensible). Colonoscopia (pseudomembranas amarillas) no es rutinaria.',
    'Colitis microscópica: diarrea acuosa crónica (>3 deposiciones/día) sin sangre, colonoscopia NORMAL. Diagnóstico SOLO por biopsia: colágena (banda de colágeno >10 μm) o linfocítica (>20 LIE/100 células epiteliales). Más en mujeres >50 años, asociada a AINEs, IBP, ISRS.'
   ],
   flashcards:[
    {q:'Tres diferencias histológicas/endoscópicas clave entre Crohn y colitis ulcerosa',a:'Crohn: granulomas no caseosos + skip lesions (discontinuo) + fisuras/fístulas. CU: inflamación continua desde recto + solo mucosa + sin granulomas + pseudopólipos inflamatorios.'},
    {q:'¿En cuál EII la colectomía total es CURATIVA y por qué?',a:'Colitis ulcerosa: solo afecta el colon y es continua desde el recto. Al resecar todo el colon, se elimina el órgano diana. En Crohn, puede afectar cualquier segmento residual y recidivar.'},
    {q:'Factores de riesgo más importantes para colitis por C. difficile',a:'Antibióticos recientes (especialmente clindamicina, cefalosporinas, fluoroquinolonas), hospitalización, edad >65 años, IBP, inmunosupresión, enfermedad inflamatoria intestinal.'},
    {q:'Primera línea para C. difficile moderado-grave según guías actuales',a:'Vancomicina oral 125 mg c/6h × 10 días o fidaxomicina 200 mg c/12h × 10 días. El metronidazol ya NO es primera línea para enfermedad no leve (guías IDSA 2021).'},
    {q:'¿Cómo se diagnostica la colitis microscópica si la colonoscopia es normal?',a:'Biopsias múltiples de diferentes segmentos colónicos (incluyendo colon derecho). El diagnóstico es exclusivamente histológico. Colágena: banda de colágeno subepitelial >10 μm. Linfocítica: >20 LIE/100 células epiteliales.'}
   ],
   quiz:[
    {q:'Hombre de 26 años con 2 años de diarrea con sangre, tenesmo y urgencia. Colonoscopia: inflamación continua desde recto hasta ángulo esplénico, mucosa granular con ulceraciones superficiales. Biopsia: infiltrado inflamatorio en mucosa, sin granulomas, distorsión criptal. ¿Diagnóstico y tratamiento inicial?',

  {id:'vasc',title:'Isquemia intestinal, HCC y neoplasias gástricas',badge:'b-gi',badgeLabel:'Digestivo',meta:'~1.5 h · Caps. 85, 87, 337 · Harrison 22e',
   resumen:[
    'Isquemia mesentérica aguda (IMA): reducción brusca del flujo en la arteria mesentérica superior (AMS). Causas: émbolo (50%, origen cardiaco: FA), trombosis (25%), NOMI (no oclusiva, bajo gasto, 20%), trombosis venosa mesentérica (5%).',
    'Clínica de IMA: dolor abdominal de inicio brusco, intenso, DESPROPORCIONADO a la exploración física (abdomen blando en fases iniciales porque el dolor es isquémico visceral, no peritoneal). Náusea, vómito, diarrea sanguinolenta tardía.',
    'Parámetros de alarma en IMA: leucocitosis, lactato elevado (>2 mmol/L), acidosis metabólica. En fases tardías: defensa peritoneal (necrosis transmural). Mortalidad >50% si hay necrosis.',
    'Diagnóstico de IMA: angioTC abdominal (gold standard) → defecto de relleno en AMS, neumatosis intestinal, gas en vena porta (signos de necrosis). Arteriografía si hay plan de revascularización percutánea.',
    'Tratamiento de IMA: reanimación hídrica + anticoagulación (heparina) + revascularización (embolectomía, bypass o trombólisis intraarterial) + resección de segmento necrótico si hay necrosis. Cirugía urgente.',
    'Colitis isquémica: isquemia del colon, generalmente no oclusiva. Afecta el "ángulo esplénico" (zona frontera entre AMS y AMI, punto de Griffith). Clínica: dolor en cuadrante inferior izquierdo + hematochezia leve. Curso autolimitado en 80%.',
    'Hepatocarcinoma (HCC): tumor hepático primario más frecuente. Factores de riesgo: cirrosis (90% de los HCC), VHB crónica (incluso sin cirrosis), VHC, aflatoxina B1, alcohol, NASH.',
    'Vigilancia de HCC: ecografía hepática + AFP cada 6 meses en pacientes de riesgo (cirrosis, VHB crónico). El objetivo es detectar tumores <2 cm donde el tratamiento es curativo.',
    'Diagnóstico de HCC sin biopsia: nódulo ≥1 cm en cirrosis con realce arterial intenso + lavado en fase portal (wash-out) en TC o RM con gadolinio. Criterios LI-RADS 5 = HCC definitivo.',
    'Sistema BCLC (Barcelona Clinic Liver Cancer): estadifica HCC en función del número de tumores, tamaño, función hepática (Child-Pugh) y performance status. Guía la decisión terapéutica (resección, ablación, TACE, sorafenib/lenvatinib, trasplante).',
    'Cáncer gástrico: adenocarcinoma en 95% de casos. H. pylori es el carcinógeno tipo I más importante. FR adicionales: dieta rica en nitratos/ahumados, tabaquismo, gastrectomía previa, anemia perniciosa.',
    'Clasificación de Lauren: tipo intestinal (bien diferenciado, antro, asociado a H. pylori y dieta, más frecuente en Asia) vs. tipo difuso (pobremente diferenciado, células en anillo de sello, linitis plástica, peor pronóstico).'
   ],
   flashcards:[
    {q:'¿Cuál es la zona del colon más susceptible a la isquemia y por qué?',a:'Ángulo esplénico (punto de Griffith): zona frontera entre AMS (arteria cólica media) y AMI (arteria cólica izquierda), con escasa circulación colateral. También el recto-sigma (punto de Sudeck).'},
    {q:'Criterios de imagen para diagnóstico de HCC sin biopsia en cirrosis',a:'Nódulo ≥1 cm + realce arterial intenso en fase arterial + lavado (wash-out) en fase portal o tardía en TC o RM. Si cumple ambos criterios en ≥1 técnica de imagen: HCC definitivo (no se necesita biopsia).'},
    {q:'¿Cuál es la bacteria carcinógena tipo I para el estómago y qué tipo de cáncer produce principalmente?',a:'Helicobacter pylori: carcinógeno tipo I (IARC, 1994). Produce principalmente adenocarcinoma gástrico tipo intestinal (Lauren) a través de la cascada de Correa: gastritis crónica → atrofia → metaplasia → displasia → adenocarcinoma.'},
    {q:'¿Qué es la linitis plástica y cuál es su pronóstico?',a:'Infiltración difusa de TODA la pared gástrica por adenocarcinoma difuso (células en anillo de sello). Estómago rígido en "cantimplora" en imagen. Irresecable en la mayoría. Supervivencia <1 año. Pronóstico muy malo.'},
    {q:'¿Por qué el dolor de la isquemia mesentérica aguda es "desproporcionado a la exploración"?',a:'En fases iniciales el dolor es visceral (isquemia = aferentes viscerales): intenso pero sin irritación peritoneal (abdomen blando). El dolor parietal (defensa, rigidez) aparece TARDE, cuando hay necrosis transmural → peritonitis.'}
   ],
   quiz:[
    {q:'Hombre de 72 años con FA crónica no anticoagulada. Dolor abdominal brusco e intenso de 3 horas. Abdomen blando, sin defensa. Leucocitos 24,000. Lactato 6.1 mmol/L. AngioTC: defecto de relleno en AMS proximal, asas intestinales con realce disminuido. ¿Diagnóstico y manejo?',
     opts:['Pancreatitis aguda grave → soporte','Isquemia mesentérica aguda por émbolo → anticoagulación + revascularización urgente (embolectomía o trombólisis) + cirugía','Colitis isquémica → colonoscopia y observación','Obstrucción intestinal → descompresión nasogástrica'],
     ans:1,fb:'IMA por émbolo (FA crónica): dolor desproporcionado + lactato elevado + defecto en AMS en angioTC. Manejo: heparina IV inmediata + evaluación quirúrgica urgente (embolectomía de AMS o trombólisis intraarterial) + resección de segmento necrótico si ya hay necrosis. Mortalidad alta si se retrasa.'},
    {q:'Mujer de 65 años post-cirugía de aorta abdominal. Al día 2 presenta dolor en fosa iliaca izquierda + hematochezia moderada. Colonoscopia de urgencia: mucosa eritematosa y hemorrágica en ángulo esplénico y colon descendente, recto normal. ¿Diagnóstico?',
     opts:['Colitis ulcerosa de inicio agudo','Colitis isquémica del ángulo esplénico (zona frontera AMS-AMI)','Cáncer de colon perforado','Diverticulitis aguda con hemorragia'],
     ans:1,fb:'Colitis isquémica: clásicamente post-cirugía aórtica (ligadura de AMI) o en pacientes con bajo gasto. Afecta preferentemente el ángulo esplénico (zona más vulnerable). El recto suele estar respetado (arteria rectal superior de AMI + arterias rectales medias/inferiores de iliacas). Tratamiento: soporte, hidratación, observación (80% autolimitada).'},
    {q:'Cirrótico de 61 años (VHC, Child-Pugh B7). Eco de vigilancia: nódulo nuevo de 1.8 cm en segmento VIII, hipoecogénico. AFP 220 ng/mL. TC dinámico: realce arterial intenso + wash-out en fase portal. ¿Cuál es el diagnóstico y el siguiente paso?',
     opts:['Colangiocarcinom → biopsia urgente','HCC (criterios radiológicos suficientes) → estadificar con BCLC y definir tratamiento','Hemangioma hepático gigante → RM para confirmar','Metástasis hepática → buscar tumor primario'],
     ans:1,fb:'HCC confirmado por criterios radiológicos (>1 cm + realce arterial + wash-out en cirrosis) → NO se necesita biopsia (riesgo de siembra tumoral). El hemangioma tiene realce periférico nodular centrípeto, no wash-out. Siguiente paso: estadificación BCLC para decidir tratamiento: ablación por radiofrecuencia, resección o TACE según función hepática.'},
    {q:'Hombre de 55 años con pérdida de peso de 12 kg en 4 meses, saciedad precoz y anemia ferropénica. Endoscopia: mucosa gástrica rígida, no distensible con el insuflado, sin úlcera visible. Biopsia: células en anillo de sello difusas en la submucosa. ¿Diagnóstico y pronóstico?',
     opts:['Gastritis atrófica severa → triple erradicación de H. pylori','Linitis plástica (adenocarcinoma gástrico difuso) → pronóstico muy desfavorable, frecuentemente irresecable','Linfoma MALT gástrico → erradicación de H. pylori','Enfermedad de Ménétrier → tratamiento con cetuximab'],
     ans:1,fb:'Linitis plástica: infiltración difusa de la pared por células en anillo de sello → estómago rígido en "cantimplora". La endoscopia puede ser engañosamente "normal" (mucosa intacta pero submucosa infiltrada). Pronóstico muy malo: la mayoría irresecables al diagnóstico. Supervivencia media <12 meses.'},
    {q:'Mujer de 48 años con infección activa por H. pylori documentada y diagnóstico de linfoma MALT gástrico de bajo grado (estadio IE). ¿Cuál es el tratamiento de primera línea?',
     opts:['Quimioterapia con CHOP inmediata','Erradicación de H. pylori (triple o cuádruple terapia) → regresión del linfoma en 70-80%','Gastrectomía total + quimioterapia adyuvante','Radioterapia gástrica exclusiva'],
     ans:1,fb:'Linfoma MALT gástrico de bajo grado estadio IE: el 95% está asociado a H. pylori. La erradicación de H. pylori produce regresión completa del linfoma en 70-80% de casos (el antígeno bacteriano estimula el clon B neoplásico). Es el único linfoma donde una infección bacteriana es suficiente como tratamiento de primera línea. Seguimiento endoscópico estricto.'}
   ]
  }
 ]

let currentDay=0,openTopic=null,topicModes={},fcIndex={},fcFlipped={},quizAnswered={},completed={},flashSeen=0;
function allTopics(){return DAYS.flat();}
function switchDay(d){currentDay=d;openTopic=null;document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i===d));document.getElementById('day-label').textContent=d===0?'Día 1 · Endocrino (mañana) · Cardio (tarde)':'Día 2 · Nefro (mañana) · Digestivo (tarde)';render();}
function updateGlobal(){const total=allTopics().length;const done=Object.keys(completed).length;const pct=Math.round(done/total*100);document.getElementById('pct').textContent=pct+'%';document.getElementById('prog-label').textContent=done+' de '+total+' temas completados';const hLeft=Math.max(0,Math.round((16-done*(16/total))*10)/10);document.getElementById('hrs-left').textContent=hLeft+' h restantes';document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('s-done').textContent=done;document.getElementById('s-total').textContent=total;document.getElementById('s-flash').textContent=flashSeen;document.getElementById('pips').innerHTML=allTopics().map(t=>'<div class="pip'+(completed[t.id]?' done':'')+'" title="'+t.title+'"></div>').join('');}
function render(){const topics=DAYS[currentDay];const c=document.getElementById('topics-container');c.innerHTML='';topics.forEach(topic=>{const isOpen=openTopic===topic.id;const isDone=!!completed[topic.id];const mode=topicModes[topic.id]||'resumen';const fi=fcIndex[topic.id]||0;const flipped=!!fcFlipped[topic.id];const qa=quizAnswered[topic.id]||{};const card=document.createElement('div');card.className='topic-card'+(isOpen?' is-open':'');let bodyHtml='';if(isOpen){const mR=mode==='resumen'?'active':'';const mF=mode==='flash'?'active':'';const mQ=mode==='quiz'?'active':'';let rHtml='<div class="content-panel '+mR+'"><div class="resumen"><ol>';topic.resumen.forEach(r=>{rHtml+='<li>'+r+'</li>';});rHtml+='</ol></div></div>';const fc=topic.flashcards[fi];let fHtml='<div class="content-panel '+mF+'">';fHtml+='<div class="fc-wrap"><div class="fc'+(flipped?' flipped':'')+'" id="fc-'+topic.id+'" onclick="flipCard(\''+topic.id+'\')">';fHtml+='<div class="fc-face fc-front">'+fc.q+'</div>';fHtml+='<div class="fc-face fc-back">'+fc.a+'</div>';fHtml+='</div></div>';fHtml+='<div class="fc-tap-hint"><i class="ti ti-hand-click" style="font-size:14px;vertical-align:-2px"></i> Toca la tarjeta para ver la respuesta</div>';fHtml+='<div class="fc-nav"><button class="nav-btn" onclick="fcNav(\''+topic.id+'\',-1)"><i class="ti ti-arrow-left"></i> Anterior</button><span class="fc-counter">'+(fi+1)+' / '+topic.flashcards.length+'</span><button class="nav-btn" onclick="fcNav(\''+topic.id+'\',1)">Siguiente <i class="ti ti-arrow-right"></i></button></div></div>';const correctCount=topic.quiz.filter((q,i)=>qa[i]===q.ans).length;const answeredCount=Object.keys(qa).length;let qHtml='<div class="content-panel '+mQ+'">';if(answeredCount>0){qHtml+='<div class="quiz-score">'+correctCount+'/'+answeredCount+' correctas</div>';}topic.quiz.forEach((q,qi)=>{const ans=qa[qi];qHtml+='<div class="quiz-item"><div class="quiz-q">'+(qi+1)+'. '+q.q+'</div><div class="quiz-opts">';q.opts.forEach((o,oi)=>{let cls='quiz-opt';if(ans!==undefined){if(oi===q.ans)cls+=' correct';else if(oi===ans&&oi!==q.ans)cls+=' wrong';}const dis=ans!==undefined?'disabled':'';qHtml+='<button class="'+cls+'" '+dis+' onclick="answerQuiz(\''+topic.id+'\','+qi+','+oi+')">'+String.fromCharCode(65+oi)+'. '+o+'</button>';});qHtml+='</div><div class="quiz-feedback'+(ans!==undefined?' show':'')+'"><strong>Explicación:</strong> '+q.fb+'</div></div>';});qHtml+='</div>';bodyHtml='<div class="topic-body open"><div class="mode-tabs"><button class="mode-btn '+mR+'" onclick="setMode(\''+topic.id+'\',\'resumen\')"><i class="ti ti-notes"></i> Resumen</button><button class="mode-btn '+mF+'" onclick="setMode(\''+topic.id+'\',\'flash\')"><i class="ti ti-cards"></i> Flashcards</button><button class="mode-btn '+mQ+'" onclick="setMode(\''+topic.id+'\',\'quiz\')"><i class="ti ti-list-check"></i> Quiz ENARM</button></div>'+rHtml+fHtml+qHtml+'</div>';}card.innerHTML='<div class="topic-header" onclick="toggleTopic(\''+topic.id+'\')"><button class="check-btn'+(isDone?' done':'')+'" onclick="event.stopPropagation();toggleDone(\''+topic.id+'\')" aria-label="Marcar como completado">'+(isDone?'<i class="ti ti-check"></i>':'')+'</button><div class="topic-info"><div class="topic-title">'+topic.title+'</div><div class="topic-meta">'+topic.meta+'</div></div><span class="topic-badge '+topic.badge+'">'+topic.badgeLabel+'</span><i class="ti ti-chevron-down topic-chevron"></i></div>'+bodyHtml;c.appendChild(card);});updateGlobal();}
function toggleTopic(id){openTopic=openTopic===id?null:id;if(openTopic&&!topicModes[id])topicModes[id]='resumen';render();}
function toggleDone(id){if(completed[id])delete completed[id];else completed[id]=true;render();}
function setMode(id,mode){topicModes[id]=mode;fcFlipped[id]=false;render();}
function flipCard(id){fcFlipped[id]=!fcFlipped[id];if(fcFlipped[id])flashSeen++;const el=document.getElementById('fc-'+id);if(el)el.classList.toggle('flipped',fcFlipped[id]);updateGlobal();}
function fcNav(id,dir){const topic=allTopics().find(t=>t.id===id);const curr=fcIndex[id]||0;fcIndex[id]=(curr+dir+topic.flashcards.length)%topic.flashcards.length;fcFlipped[id]=false;render();}
function answerQuiz(topicId,qi,oi){if(!quizAnswered[topicId])quizAnswered[topicId]={};if(quizAnswered[topicId][qi]!==undefined)return;quizAnswered[topicId][qi]=oi;const topic=allTopics().find(t=>t.id===topicId);const allRight=topic.quiz.every((q,i)=>quizAnswered[topicId][i]===q.ans);if(allRight)completed[topicId]=true;render();}
render();
</script>
